<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학부모 자녀매칭 - BTA</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='parent-registration.css') }}">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ag-grid-community@31.0.0/dist/ag-grid-community.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31.0.0/styles/ag-grid.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31.0.0/styles/ag-theme-alpine.css">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="{{ url_for('static', filename='common_code_util.js') }}"></script>
    <script src="{{ url_for('static', filename='user_search_modal.js') }}"></script>
    <script src="{{ url_for('static', filename='parent_user_search_modal.js') }}"></script>
</head>
<body>
    <script>
        const firebaseConfig = {
            apiKey: "{{ firebase_config.api_key if firebase_config else '' }}",
            projectId: "{{ firebase_config.project_id if firebase_config else '' }}",
            storageBucket: "{{ firebase_config.storage_bucket if firebase_config else '' }}"
        };
        if (firebaseConfig.apiKey && firebaseConfig.projectId) {
            firebase.initializeApp(firebaseConfig);
        }
    </script>
    <div class="container">
        <div class="announcements-header">
            <h1 class="page-title">학부모 자녀매칭</h1>
            <a href="/" class="home-button">홈</a>
        </div>

        <div class="parent-registration-container">
            <div class="parent-section">
                <div class="section-header">
                    <span class="section-icon">■</span>
                    <h2>학부모 자녀매칭</h2>
                    <button id="addParentButton" class="add-button">+</button>
                </div>
                <div class="filter-section" style="margin-bottom: 10px;">
                    <span class="filter-label">학기:</span>
                    <select id="filterSemester" class="filter-select">
                        <option value="">전체</option>
                    </select>
                    <span class="filter-label">학부모:</span>
                    <input type="text" id="filterParentName" class="search-input" placeholder="성명" style="width: 120px;">
                    <button id="filterSearchParentButton" class="search-button">조회</button>
                </div>
                <div id="parentGrid" class="ag-theme-alpine"></div>
            </div>

            <div class="student-section">
                <div class="section-header">
                    <span class="section-icon">■</span>
                    <h2>훈련생등록</h2>
                    <button id="exportExcelButton" class="export-excel-button">엑셀 다운로드</button>
                    <button id="addStudentButton" class="add-button">+</button>
                </div>
                <div id="studentGrid" class="ag-theme-alpine"></div>
            </div>
        </div>
    </div>

    <!-- 학부모 자녀매칭 모달 (학기 + 학부모 선택) -->
    <div id="parentModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="parentModalTitle">학부모 자녀매칭</h3>
                <span class="close-button">&times;</span>
            </div>
            <div class="modal-body">
                <table class="modal-form">
                    <tr>
                        <td>학기</td>
                        <td>
                            <select id="modalSemester" class="modal-select">
                                <option value="">선택하세요</option>
                            </select>
                        </td>
                    </tr>
                    <tr>
                        <td>학부모</td>
                        <td>
                            <div class="input-with-icon">
                                <input type="text" id="modalParentName" class="modal-input" readonly placeholder="조회 버튼으로 선택">
                                <button id="searchParentButton" class="search-icon-button" type="button" title="학부모 조회">🔍</button>
                            </div>
                        </td>
                    </tr>
                </table>
            </div>
            <div class="modal-footer">
                <button id="saveParentButton" class="save-button">저장</button>
                <button id="cancelParentButton" class="cancel-button">취소</button>
            </div>
        </div>
    </div>

    <!-- 학부모 조회 모달 (ParentUserSearchModal) -->
    <div id="parentUserSearchModal" class="modal">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h3>학부모 조회</h3>
                <span class="close-button">&times;</span>
            </div>
            <div class="modal-body">
                <div class="search-section search-section-oneline">
                    <div class="search-fields search-fields-oneline">
                        <div class="search-field">
                            <label>성명</label>
                            <input type="text" id="searchParentUserName" class="search-input" placeholder="성명 입력">
                        </div>
                        <div class="search-field">
                            <label>전화번호</label>
                            <input type="text" id="searchParentUserPhone" class="search-input" placeholder="전화번호 입력">
                        </div>
                        <div class="search-field">
                            <label>사용자구분</label>
                            <select id="searchParentUserType" class="search-select search-select-narrow">
                                <option value="">전체</option>
                            </select>
                        </div>
                        <div class="search-field">
                            <label>재학구분</label>
                            <select id="searchParentStudentStatus" class="search-select search-select-narrow">
                                <option value="">전체</option>
                            </select>
                        </div>
                        <button id="searchParentSearchButton" class="search-button">조회</button>
                    </div>
                </div>
                <div id="parentUserSearchGrid" class="ag-theme-alpine" style="height: 400px; margin-top: 15px;"></div>
                <div style="margin-top: 10px; padding: 10px; background-color: #e3f2fd; border-radius: 4px; color: #1976d2; font-size: 14px;">
                    💡 사용법: 행을 클릭하여 선택한 후, 하단의 "선택" 버튼을 클릭하세요.
                </div>
            </div>
            <div class="modal-footer">
                <button id="selectParentConfirmButton" class="save-button">선택</button>
                <button id="closeParentSearchButton" class="cancel-button">닫기</button>
            </div>
        </div>
    </div>

    <!-- 사용자 조회 모달 (학생 등록용 - UserSearchModal) -->
    <div id="userSearchModal" class="modal">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h3>사용자 조회 (학부모, 신입생 제외)</h3>
                <span class="close-button">&times;</span>
            </div>
            <div class="modal-body">
                <div class="search-section">
                    <div class="search-fields">
                        <div class="search-field">
                            <label>성명</label>
                            <input type="text" id="searchUserName" class="search-input" placeholder="성명 입력">
                        </div>
                        <div class="search-field">
                            <label>전화번호</label>
                            <input type="text" id="searchUserPhone" class="search-input" placeholder="전화번호 입력">
                        </div>
                        <div class="search-field">
                            <label>사용자구분</label>
                            <select id="searchUserUserType" class="search-select search-select-small">
                                <option value="">전체</option>
                            </select>
                        </div>
                        <div class="search-field">
                            <label>재학구분</label>
                            <select id="searchUserStudentStatus" class="search-select search-select-small">
                                <option value="">전체</option>
                            </select>
                        </div>
                        <button id="searchUserSearchButton" class="search-button">조회</button>
                    </div>
                </div>
                <div id="userSearchGrid" class="ag-theme-alpine" style="height: 400px; margin-top: 15px;"></div>
                <div style="margin-top: 10px; padding: 10px; background-color: #e3f2fd; border-radius: 4px; color: #1976d2; font-size: 14px;">
                    💡 사용법: 체크박스를 선택한 후, 하단의 "저장" 버튼을 클릭하세요.
                </div>
            </div>
            <div class="modal-footer">
                <button id="selectUserConfirmButton" class="save-button">저장</button>
                <button id="closeUserSearchButton" class="cancel-button">닫기</button>
            </div>
        </div>
    </div>

    <script>
        const auth = firebase.auth();
        const db = firebase.firestore();
        let selectedParentId = null;
        let semesterList = [];
        let allStudentData = [];
        let studentStatusList = [];
        let userTypeList = [];

        function getCurrentDateYmd() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            return year + month + day;
        }

        function loadLookupLists() {
            const currentDate = getCurrentDateYmd();
            Promise.all([
                getLookupValueList(db, '140', currentDate),
                getLookupValueList(db, '130', currentDate),
                getLookupValueList(db, '110', currentDate)
            ]).then(function(results) {
                semesterList = results[0] || [];
                studentStatusList = results[1] || [];
                userTypeList = results[2] || [];
                semesterList.sort(function(a, b) {
                    const sortA = a.sort || 0;
                    const sortB = b.sort || 0;
                    return sortB - sortA;
                });
                var semesterSelect = document.getElementById('modalSemester');
                if (semesterSelect) {
                    semesterSelect.innerHTML = '<option value="">선택하세요</option>';
                    semesterList.forEach(function(item) {
                        var option = document.createElement('option');
                        option.value = item.value_cd;
                        option.textContent = item.value_nm;
                        semesterSelect.appendChild(option);
                    });
                }
                var filterSemesterSelect = document.getElementById('filterSemester');
                if (filterSemesterSelect) {
                    filterSemesterSelect.innerHTML = '<option value="">전체</option>';
                    semesterList.forEach(function(item) {
                        var option = document.createElement('option');
                        option.value = item.value_cd;
                        option.textContent = item.value_nm;
                        filterSemesterSelect.appendChild(option);
                    });
                }
                var searchUserStudentStatusSelect = document.getElementById('searchUserStudentStatus');
                if (searchUserStudentStatusSelect && studentStatusList.length) {
                    searchUserStudentStatusSelect.innerHTML = '<option value="">전체</option>';
                    var defaultStudentStatusCd = '';
                    studentStatusList.forEach(function(item) {
                        var option = document.createElement('option');
                        option.value = item.value_cd;
                        option.textContent = item.value_nm;
                        searchUserStudentStatusSelect.appendChild(option);
                        if (item.value_nm === '재학') defaultStudentStatusCd = item.value_cd;
                    });
                    if (defaultStudentStatusCd) searchUserStudentStatusSelect.value = defaultStudentStatusCd;
                }
                if (typeof ParentUserSearchModal !== 'undefined') {
                    ParentUserSearchModal.init({
                        title: '학부모 조회',
                        userTypeDefault: '학부모',
                        userTypeDisabled: true,
                        studentStatusList: studentStatusList,
                        userTypeList: userTypeList,
                        db: db,
                        getCurrentDateYmd: getCurrentDateYmd,
                        onSelect: function(userId, name, data) {
                            var el = document.getElementById('modalParentName');
                            if (el) {
                                el.value = name;
                                el.setAttribute('data-userid', userId);
                                ParentUserSearchModal.close();
                                checkAndRemoveModalClass();
                            } else {
                                ParentUserSearchModal.close();
                                checkAndRemoveModalClass();
                                openAddParentModal();
                                setTimeout(function() {
                                    var e = document.getElementById('modalParentName');
                                    if (e) {
                                        e.value = name;
                                        e.setAttribute('data-userid', userId);
                                        showMessageModal('학부모가 선택되었습니다: ' + name + '\n\n학기를 선택하고 저장 버튼을 클릭하세요.');
                                    }
                                }, 200);
                            }
                        }
                    });
                    var origClose = ParentUserSearchModal.close;
                    ParentUserSearchModal.close = function() {
                        origClose.call(this);
                        setTimeout(checkAndRemoveModalClass, 100);
                    };
                }
                if (typeof UserSearchModal !== 'undefined') {
                    UserSearchModal.init({
                        title: '사용자 조회',
                        userTypeDefault: '학생',
                        userTypeDisabled: true,
                        collectionName: 'bta_parent_students',
                        idFieldName: 'parent_id',
                        getSelectedId: function() { return selectedParentId; },
                        loadDataCallback: loadStudentData,
                        studentStatusList: studentStatusList,
                        userTypeList: userTypeList,
                        db: db,
                        getCurrentDateYmd: getCurrentDateYmd
                    });
                    var origClose2 = UserSearchModal.close;
                    UserSearchModal.close = function() {
                        origClose2.call(this);
                        setTimeout(checkAndRemoveModalClass, 100);
                    };
                }
            }).catch(function(err) {
                console.error('공통코드 로드 오류:', err);
            });
        }

        var parentColumnDefs = [
            { field: 'semester_nm', headerName: '학기', flex: 1, sortable: true },
            { field: 'parent_name', headerName: '학부모', flex: 1, sortable: true },
            { field: 'phone', headerName: '전화번호', flex: 1, sortable: true },
            { headerName: '삭제', width: 80, cellRenderer: function() { return '<button class="delete-btn">삭제</button>'; }, onCellClicked: function(p) { deleteParent(p.data); } }
        ];
        var studentColumnDefs = [
            { field: 'name', headerName: '성명', width: 150, sortable: true },
            { field: 'user_type_nm', headerName: '사용자구분', width: 150, sortable: true },
            { field: 'phone', headerName: '전화번호', width: 180, sortable: true },
            { headerName: '삭제', width: 100, cellRenderer: function() { return '<button class="delete-btn">삭제</button>'; }, onCellClicked: function(p) { deleteStudent(p.data); } }
        ];
        var parentGridOptions = {
            columnDefs: parentColumnDefs,
            rowSelection: 'single',
            suppressRowClickSelection: false,
            onFirstDataRendered: function(event) {
                if (event.api.getDisplayedRowCount() > 0) {
                    var first = event.api.getRowNode({ rowIndex: 0 });
                    if (first) { first.setSelected(true, true); event.api.ensureIndexVisible(0, 'middle'); }
                }
            },
            onRowClicked: function(event) {
                if (event.data) {
                    selectedParentId = event.data.parent_id;
                    loadStudentData(selectedParentId);
                }
            }
        };
        var studentGridOptions = {
            columnDefs: studentColumnDefs,
            defaultColDef: { resizable: true },
            domLayout: 'normal',
            rowHeight: 40
        };
        var parentGridApi = agGrid.createGrid(document.querySelector('#parentGrid'), parentGridOptions);
        var studentGridApi = agGrid.createGrid(document.querySelector('#studentGrid'), studentGridOptions);

        function loadParentData() {
            var currentDate = getCurrentDateYmd();
            var filterSemester = (document.getElementById('filterSemester') && document.getElementById('filterSemester').value) || '';
            var filterParentName = (document.getElementById('filterParentName') && document.getElementById('filterParentName').value.trim()) || '';
            db.collection('bta_parent').get()
                .then(function(snap) {
                    var promises = [];
                    var data = [];
                    snap.forEach(function(doc) {
                        var d = doc.data();
                        var semesterCd = d.semester_cd || '';
                        var userid = d.userid || d.userld || '';
                        var p = Promise.all([
                            semesterCd ? getLookupValueName(db, '140', semesterCd, currentDate) : Promise.resolve(null),
                            semesterCd ? getLookupValueSort(db, '140', semesterCd, currentDate) : Promise.resolve(0),
                            userid ? db.collection('bta_users').where('userId', '==', userid).get() : Promise.resolve(null)
                        ]).then(function(r) {
                            var semesterNm = r[0] || '';
                            var semesterSort = r[1] || 0;
                            var userSnap = r[2];
                            var parentName = '';
                            var parentPhone = '';
                            if (userSnap && !userSnap.empty) {
                                var u = userSnap.docs[0].data();
                                parentName = u.name || '';
                                parentPhone = u.phone || '';
                            }
                            if (filterSemester && semesterCd !== filterSemester) return;
                            if (filterParentName && parentName.indexOf(filterParentName) !== 0) return;
                            data.push({
                                parent_id: doc.id,
                                semester_cd: semesterCd,
                                semester_nm: semesterNm,
                                userid: userid,
                                parent_name: parentName,
                                phone: parentPhone,
                                semester_sort: semesterSort
                            });
                        });
                        promises.push(p);
                    });
                    return Promise.all(promises).then(function() { return data; });
                })
                .then(function(data) {
                    data.sort(function(a, b) {
                        if (a.semester_sort !== b.semester_sort) return b.semester_sort - a.semester_sort;
                        return (a.parent_name || '').localeCompare(b.parent_name || '');
                    });
                    parentGridApi.setGridOption('rowData', data);
                    if (data.length > 0) {
                        selectedParentId = data[0].parent_id;
                        loadStudentData(selectedParentId);
                        setTimeout(function() {
                            try {
                                parentGridApi.forEachNode(function(node) {
                                    if (node.rowIndex === 0) {
                                        node.setSelected(true, true);
                                        parentGridApi.ensureIndexVisible(0, 'middle');
                                    }
                                });
                            } catch (e) {}
                        }, 200);
                    } else {
                        studentGridApi.setGridOption('rowData', []);
                    }
                })
                .catch(function(err) {
                    console.error('학부모 자녀매칭 데이터 로드 오류:', err);
                    var msg = '학부모 자녀매칭 데이터를 불러오는 중 오류가 발생했습니다.';
                    if (err && err.code === 'permission-denied') {
                        msg += '\n\nFirestore 보안 규칙을 확인해주세요.\nmatch /bta_parent/{document=**} { allow read, write: if request.auth != null; }\nmatch /bta_parent_students/{document=**} { allow read, write: if request.auth != null; }';
                    }
                    showMessageModal(msg);
                });
        }

        function loadStudentData(parentId) {
            if (!parentId) {
                studentGridApi.setGridOption('rowData', []);
                return;
            }
            var currentDate = getCurrentDateYmd();
            db.collection('bta_parent_students').where('parent_id', '==', parentId).get()
                .then(function(snap) {
                    var promises = [];
                    var data = [];
                    snap.forEach(function(doc) {
                        var d = doc.data();
                        var userId = d.userid || d.userld || '';
                        if (!userId) return;
                        var p = db.collection('bta_users').where('userId', '==', userId).get()
                            .then(function(userSnap) {
                                if (userSnap.empty) return;
                                var u = userSnap.docs[0].data();
                                var ut = u.user_type || '';
                                return getLookupValueName(db, '110', ut, currentDate).then(function(nm) {
                                    return getLookupValueSort(db, '110', ut, currentDate).then(function(sort) {
                                        data.push({
                                            id: doc.id,
                                            userId: userId,
                                            name: u.name || '',
                                            user_type: ut,
                                            user_type_nm: nm || '',
                                            phone: u.phone || '',
                                            user_type_sort: sort || 0
                                        });
                                    });
                                });
                            });
                        promises.push(p);
                    });
                    return Promise.all(promises).then(function() { return data; });
                })
                .then(function(data) {
                    data.sort(function(a, b) {
                        if (a.user_type_sort !== b.user_type_sort) return a.user_type_sort - b.user_type_sort;
                        return (a.name || '').localeCompare(b.name || '');
                    });
                    allStudentData = data;
                    studentGridApi.setGridOption('rowData', data);
                    setTimeout(function() {
                        try {
                            if (studentGridApi && studentGridApi.sizeColumnsToFit) studentGridApi.sizeColumnsToFit();
                        } catch (e) {}
                    }, 100);
                })
                .catch(function(err) {
                    console.error('학생등록 데이터 로드 오류:', err);
                    showMessageModal('학생등록 데이터를 불러오는 중 오류가 발생했습니다.');
                });
        }

        function openAddParentModal() {
            document.getElementById('parentModalTitle').textContent = '학부모 자녀매칭';
            document.getElementById('modalSemester').value = '';
            document.getElementById('modalParentName').value = '';
            document.getElementById('modalParentName').removeAttribute('data-userid');
            document.getElementById('parentModal').style.display = 'block';
            document.body.classList.add('modal-open');
        }

        function closeParentModal() {
            document.getElementById('parentModal').style.display = 'none';
            checkAndRemoveModalClass();
        }

        function checkAndRemoveModalClass() {
            var parentModal = document.getElementById('parentModal');
            var parentUserSearchModal = document.getElementById('parentUserSearchModal');
            var userSearchModal = document.getElementById('userSearchModal');
            var allClosed = (!parentModal || parentModal.style.display === 'none' || parentModal.style.display === '') &&
                (!parentUserSearchModal || parentUserSearchModal.style.display === 'none' || parentUserSearchModal.style.display === '') &&
                (!userSearchModal || userSearchModal.style.display === 'none' || userSearchModal.style.display === '');
            if (allClosed) document.body.classList.remove('modal-open');
        }

        function saveParent() {
            var semesterCd = document.getElementById('modalSemester').value;
            var userid = document.getElementById('modalParentName').getAttribute('data-userid');
            if (!semesterCd) { showMessageModal('학기를 선택해주세요.'); return; }
            if (!userid) { showMessageModal('학부모를 선택해주세요.'); return; }
            db.collection('bta_parent').where('semester_cd', '==', semesterCd).where('userid', '==', userid).get()
                .then(function(snap) {
                    if (!snap.empty) {
                        showMessageModal('이미 등록된 학기와 학부모 조합입니다.');
                        return Promise.reject(new Error('중복'));
                    }
                    return db.collection('bta_parent').add({ semester_cd: semesterCd, userid: userid });
                })
                .then(function() {
                    showMessageModal('등록되었습니다.');
                    closeParentModal();
                    loadParentData();
                })
                .catch(function(e) {
                    if (e && e.message !== '중복') {
                        console.error('등록 오류:', e);
                        showMessageModal('등록 중 오류가 발생했습니다.');
                    }
                });
        }

        function deleteParent(data) {
            showConfirmModal('정말 삭제하시겠습니까?', function() {
            db.collection('bta_parent_students').where('parent_id', '==', data.parent_id).get()
                .then(function(snap) {
                    if (!snap.empty) {
                        showMessageModal('등록된 학생이 있어 삭제할 수 없습니다.');
                        return Promise.reject(new Error('학생 존재'));
                    }
                    return db.collection('bta_parent').doc(data.parent_id).delete();
                })
                .then(function() {
                    showMessageModal('삭제되었습니다.');
                    loadParentData();
                })
                .catch(function(e) {
                    if (e && e.message !== '학생 존재') {
                        console.error('삭제 오류:', e);
                        showMessageModal('삭제 중 오류가 발생했습니다.');
                    }
                });
            });
        }

        function deleteStudent(data) {
            showConfirmModal('정말 삭제하시겠습니까?', function() {
            db.collection('bta_parent_students').doc(data.id).delete()
                .then(function() {
                    showMessageModal('삭제되었습니다.');
                    loadStudentData(selectedParentId);
                })
                .catch(function(e) {
                    console.error('삭제 오류:', e);
                    showMessageModal('삭제 중 오류가 발생했습니다.');
                });
            });
        }

        function openParentSearchModal() {
            if (typeof ParentUserSearchModal !== 'undefined') ParentUserSearchModal.open();
            else console.error('ParentUserSearchModal이 로드되지 않았습니다.');
        }

        function exportToExcel() {
            if (allStudentData.length === 0) {
                showMessageModal('다운로드할 데이터가 없습니다.');
                return;
            }
            var exportData = allStudentData.map(function(item) {
                return { '성명': item.name || '', '사용자구분': item.user_type_nm || '', '전화번호': item.phone || '' };
            });
            var ws = XLSX.utils.json_to_sheet(exportData);
            var wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, '학생등록');
            XLSX.writeFile(wb, '학생등록_' + new Date().toISOString().slice(0, 10).replace(/-/g, '') + '.xlsx');
        }

        document.getElementById('addParentButton').addEventListener('click', openAddParentModal);
        document.getElementById('saveParentButton').addEventListener('click', saveParent);
        document.getElementById('cancelParentButton').addEventListener('click', closeParentModal);
        var searchParentBtn = document.getElementById('searchParentButton');
        if (searchParentBtn) searchParentBtn.addEventListener('click', openParentSearchModal);
        var filterSearchBtn = document.getElementById('filterSearchParentButton');
        if (filterSearchBtn) filterSearchBtn.addEventListener('click', function() { loadParentData(); });
        document.getElementById('addStudentButton').addEventListener('click', function() {
            if (typeof UserSearchModal !== 'undefined') UserSearchModal.open();
            else console.error('UserSearchModal이 로드되지 않았습니다.');
        });
        document.getElementById('exportExcelButton').addEventListener('click', exportToExcel);

        document.querySelectorAll('.close-button').forEach(function(btn) {
            btn.addEventListener('click', function() {
                if (btn.closest('#userSearchModal')) {
                    if (typeof UserSearchModal !== 'undefined') UserSearchModal.close();
                } else if (btn.closest('#parentUserSearchModal')) {
                    if (typeof ParentUserSearchModal !== 'undefined') ParentUserSearchModal.close();
                } else {
                    closeParentModal();
                }
            });
        });
        window.addEventListener('click', function(event) {
            if (event.target.id === 'parentModal') closeParentModal();
            if (event.target.id === 'parentUserSearchModal' && typeof ParentUserSearchModal !== 'undefined') ParentUserSearchModal.close();
            if (event.target.id === 'userSearchModal' && typeof UserSearchModal !== 'undefined') UserSearchModal.close();
        });

        auth.onAuthStateChanged(function(user) {
            if (user) {
                loadLookupLists();
                loadParentData();
            } else {
                window.location.href = '/login';
            }
        });
    </script>
</body>
</html>
