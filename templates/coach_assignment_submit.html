<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스탭방 - 과제제출확인</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='task_list.css') }}">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ag-grid-community@31.0.0/dist/ag-grid-community.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31.0.0/styles/ag-grid.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31.0.0/styles/ag-theme-alpine.css">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="{{ url_for('static', filename='common_code_util.js') }}"></script>
</head>
<body>
    <script>
        const firebaseConfig = {
            apiKey: "{{ firebase_config.api_key if firebase_config else '' }}",
            projectId: "{{ firebase_config.project_id if firebase_config else '' }}",
            storageBucket: "{{ firebase_config.storage_bucket if firebase_config else '' }}"
        };
        if (firebaseConfig.apiKey && firebaseConfig.projectId) {
            firebase.initializeApp(firebaseConfig);
        }
    </script>
    <style>
        .announcements-header { position: relative; justify-content: flex-start; }
        .announcements-header .page-title { flex: 1; text-align: left; }
        .announcements-header .home-button { position: absolute; right: 0; }
    </style>
    <div class="container">
        <div class="announcements-header">
            <h1 class="page-title">과제제출확인</h1>
            <a href="/" class="home-button">홈</a>
        </div>

        <div class="task-list-search-container">
            <div class="search-section">
                <div class="search-fields">
                    <div class="search-left">
                        <div class="search-field">
                            <label><span class="required-field">*</span>학기</label>
                            <select id="searchSemester" class="search-select" title="필수">
                                <option value="">선택하세요</option>
                            </select>
                        </div>
                        <div class="search-field">
                            <label><span class="required-field">*</span>반</label>
                            <select id="searchClass" class="search-select" title="필수 (학기 선택 후 선택 가능)" disabled>
                                <option value="">선택하세요</option>
                            </select>
                        </div>
                        <div class="search-field">
                            <label><span class="required-field">*</span>주차</label>
                            <select id="searchWeek" class="search-select" title="필수 (학기·반 선택 후 선택 가능)" disabled>
                                <option value="">선택하세요</option>
                            </select>
                        </div>
                        <div class="search-field">
                            <label>훈련생</label>
                            <select id="searchStudent" class="search-select" title="학기·반 선택 후 선택 가능" style="min-width: 140px;" disabled>
                                <option value="">전체</option>
                            </select>
                        </div>
                        <button id="searchButton" class="search-button">조회</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="task-list-container">
            <div class="task-group-section" style="flex: 1 1 100%;">
                <div class="section-header">
                    <span class="section-icon">■</span>
                    <h2>과제제출확인</h2>
                </div>
                <div id="assignmentSubmitGrid" class="ag-theme-alpine"></div>
            </div>
        </div>
    </div>

    <!-- 과제수행도 모달 (A형: 그리드) -->
    <div id="performanceModal" class="modal" style="display: none;">
        <div class="modal-content" style="max-width: 600px;">
            <div class="modal-header" style="position: relative; justify-content: flex-start;">
                <h3 id="performanceModalTitle" style="text-align: left; margin: 0;">과제수행도 <span id="performanceModalStudentName" style="color: blue;"></span></h3>
                <span class="close-button" id="performanceModalClose" style="position: absolute; right: 12px;">&times;</span>
            </div>
            <div class="modal-body">
                <style>
                    #performanceGrid .ag-header-cell.ag-header-cell-center { text-align: center; }
                    #performanceGrid .ag-cell.ag-cell-center { text-align: center; }
                    #performanceGrid .performance-content-select { text-align: center; }
                </style>
                <div id="performanceGrid" class="ag-theme-alpine" style="height: 500px; width: 100%;"></div>
                <div class="form-buttons" style="margin-top: 12px; display: flex; justify-content: flex-end; gap: 10px;">
                    <button id="performanceSaveButton" class="save-button">제출</button>
                    <button id="performanceTempSaveButton" class="save-button">임시저장</button>
                    <button id="performanceCancelButton" class="cancel-button">취소</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 기록과제물 모달 -->
    <div id="recordTaskModal" class="modal" style="display: none;">
        <div class="modal-content" style="max-width: 700px;">
            <div class="modal-header">
                <h3>기록과제물 <span id="recordTaskModalStudentName" style="color: blue;"></span></h3>
                <span class="close-button" id="recordTaskModalClose">&times;</span>
            </div>
            <div class="modal-body" id="recordTaskModalBody">
                <!-- JavaScript에서 동적으로 생성됨 -->
            </div>
        </div>
    </div>

    <!-- 정성평가 모달 -->
    <div id="qualitativeModal" class="modal" style="display: none;">
        <div class="modal-content" style="max-width: 700px;">
            <div class="modal-header">
                <h3>정성평가 <span id="qualitativeModalStudentName" style="color: blue;"></span></h3>
                <span class="close-button" id="qualitativeModalClose">&times;</span>
            </div>
            <div class="modal-body">
                <!-- 1부 강의 및 수업 태도 -->
                <div style="margin-bottom: 25px;">
                    <h4 style="margin-bottom: 10px; font-weight: bold;">■ 1부 강의 및 수업 태도</h4>
                    <textarea id="classAttitudeInput" style="width: 100%; height: 180px; padding: 15px; border: 1px solid #ddd; border-radius: 4px; resize: vertical; font-size: 14px; line-height: 1.5; font-family: inherit;" placeholder="1부 강의 및 수업 태도를 입력하세요"></textarea>
                    <div style="margin-top: 8px; display: flex; justify-content: flex-end; align-items: center; gap: 12px;">
                        <span style="font-size: 14px; color: #666; font-weight: bold;">평가 점수</span>
                        <select id="classAttitudeScore" class="search-select" style="width: 160px; height: 32px; padding: 4px 8px; text-align: center; font-weight: bold; box-sizing: border-box; border: 1px solid #06c;">
                            <option value="">선택하세요</option>
                        </select>
                    </div>
                </div>

                <!-- 2부 코치 모임 태도 -->
                <div style="margin-bottom: 25px;">
                    <h4 style="margin-bottom: 10px; font-weight: bold;">■ 2부 코치 모임 태도</h4>
                    <textarea id="meetingAttitudeInput" style="width: 100%; height: 180px; padding: 15px; border: 1px solid #ddd; border-radius: 4px; resize: vertical; font-size: 14px; line-height: 1.5; font-family: inherit;" placeholder="2부 코치 모임 태도를 입력하세요"></textarea>
                    <div style="margin-top: 8px; display: flex; justify-content: flex-end; align-items: center; gap: 12px;">
                        <span style="font-size: 14px; color: #666; font-weight: bold;">평가 점수</span>
                        <select id="meetingAttitudeScore" class="search-select" style="width: 160px; height: 32px; padding: 4px 8px; text-align: center; font-weight: bold; box-sizing: border-box; border: 1px solid #06c;">
                            <option value="">선택하세요</option>
                        </select>
                    </div>
                </div>

                <!-- 버튼 -->
                <div class="form-buttons" style="margin-top: 20px; display: flex; justify-content: flex-end; gap: 10px;">
                    <button id="qualitativeSaveButton" class="save-button">제출</button>
                    <button id="qualitativeTempSaveButton" class="save-button">임시저장</button>
                    <button id="qualitativeCancelButton" class="cancel-button">취소</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 종합평가 모달 -->
    <div id="comprehensiveModal" class="modal" style="display: none;">
        <div class="modal-content" style="max-width: 900px;">
            <div class="modal-header" id="comprehensiveModalHeader">
                <h3 style="text-align: left; margin: 0;">종합평가 <span id="comprehensiveModalStudentName" style="color: blue;"></span></h3>
                <span class="close-button" id="comprehensiveModalClose">&times;</span>
            </div>
            <div class="modal-body" style="display: flex; flex-direction: column; min-height: 560px;">
                <style>
                    #comprehensiveModal .modal-header { display: flex; justify-content: space-between; align-items: center; }
                    #comprehensiveGrid .ag-header-cell.ag-header-cell-center { text-align: center !important; }
                    #comprehensiveGrid .ag-cell-center { text-align: center; }
                    #comprehensiveGrid .comprehensive-assessment-select { min-width: 100px; width: 100%; height: 28px; padding: 2px 8px; box-sizing: border-box; text-align: center; }
                </style>
                <div style="display: flex; justify-content: flex-end; align-items: center; padding: 0 0 8px 0;">
                    <button id="comprehensiveExportExcelButton" class="export-excel-button">엑셀 다운로드</button>
                </div>
                <div id="comprehensiveGrid" class="ag-theme-alpine" style="height: 500px; width: 100%;"></div>
                <div style="display: flex; justify-content: space-between; align-items: center; padding: 12px 0 0 0;">
                    <p style="margin: 0; font-size: 14px; color: #555;">※ 종합평가 전에 누적점수 계산 버튼을 클릭해 주세요.</p>
                    <div class="form-buttons" style="display: flex; gap: 10px;">
                        <button id="comprehensiveCalcButton" class="save-button">누적점수 계산</button>
                        <button id="comprehensiveSaveButton" class="save-button">저장</button>
                        <button id="comprehensiveCancelButton" class="cancel-button">취소</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const auth = firebase.auth();
        const db = firebase.firestore();

        function getCurrentDateYmd() {
            var now = new Date();
            var y = now.getFullYear();
            var m = String(now.getMonth() + 1).padStart(2, '0');
            var d = String(now.getDate()).padStart(2, '0');
            return y + m + d;
        }

        function formatYmdToDate(ymd) {
            if (!ymd || ymd.length !== 8) return '';
            return ymd.substring(0, 4) + '-' + ymd.substring(4, 6) + '-' + ymd.substring(6, 8);
        }

        /** 과제목록 생성과 동일 규칙 — 주차·학생당 점수 문서 1건 */
        function buildStudentScoreDocId(semesterCd, classCd, weekCd, userid) {
            function seg(s) {
                return String(s || '').trim().replace(/\//g, '_').replace(/\s+/g, '_');
            }
            return [seg(semesterCd), seg(classCd), seg(weekCd), seg(userid)].join('_');
        }

        var userClassIds = [];
        var semesterCreateYmdMap = {};
        var classCreateYmdMap = {};

        function loadSemesterOptions() {
            var user = auth.currentUser;
            if (!user) return Promise.resolve();
            var uid = user.uid;
            return db.collection('bta_class_students').where('userid', '==', uid).get()
                .then(function(csSnap) {
                    userClassIds = [];
                    csSnap.forEach(function(doc) { userClassIds.push(doc.data().class_id || doc.id); });
                    if (userClassIds.length === 0) return [];
                    var promises = userClassIds.map(function(cid) { return db.collection('bta_class').doc(cid).get(); });
                    return Promise.all(promises);
                })
                .then(function(docSnaps) {
                    var seen = {};
                    var list = [];
                    docSnaps.forEach(function(ds) {
                        if (!ds.exists) return;
                        var d = ds.data();
                        var semesterCd = (d.semester_cd || '').toString().trim();
                        var createYmd = (d.create_ymd || getCurrentDateYmd()).toString().trim();
                        if (!semesterCd || createYmd.length !== 8) return;
                        var key = semesterCd;
                        if (seen[key]) return;
                        seen[key] = true;
                        list.push({ semester_cd: semesterCd, create_ymd: createYmd });
                    });
                    return list;
                })
                .then(function(list) {
                    var promises = list.map(function(item) {
                        return getLookupValueName(db, '140', item.semester_cd, item.create_ymd)
                            .then(function(nm) { return { value_cd: item.semester_cd, value_nm: nm || item.semester_cd, create_ymd: item.create_ymd }; })
                            .catch(function() { return { value_cd: item.semester_cd, value_nm: item.semester_cd, create_ymd: item.create_ymd }; });
                    });
                    return Promise.all(promises);
                })
                .then(function(options) {
                    var sortPromises = options.map(function(o) {
                        return getLookupValueSort(db, '140', o.value_cd, o.create_ymd)
                            .then(function(s) { return { option: o, sortVal: (s !== undefined && s !== null) ? s : 0 }; })
                            .catch(function() { return { option: o, sortVal: 0 }; });
                    });
                    return Promise.all(sortPromises);
                })
                .then(function(withSort) {
                    withSort.sort(function(a, b) { return (b.sortVal - a.sortVal); });
                    var options = withSort.map(function(p) { return p.option; });
                    semesterCreateYmdMap = {};
                    options.forEach(function(o) { semesterCreateYmdMap[o.value_cd] = o.create_ymd; });
                    var sel = document.getElementById('searchSemester');
                    sel.innerHTML = '';
                    if (options.length === 0) {
                        var emptyOpt = document.createElement('option');
                        emptyOpt.value = '';
                        emptyOpt.textContent = '선택하세요';
                        sel.appendChild(emptyOpt);
                    } else {
                        options.forEach(function(o) {
                            var opt = document.createElement('option');
                            opt.value = o.value_cd;
                            opt.textContent = o.value_nm;
                            sel.appendChild(opt);
                        });
                        sel.value = options[0].value_cd;
                        loadClassOptions(options[0].value_cd);
                    }
                    var classSel = document.getElementById('searchClass');
                    classSel.disabled = options.length === 0;
                    if (options.length === 0) classSel.innerHTML = '<option value="">선택하세요</option>';
                    document.getElementById('searchWeek').disabled = true;
                    document.getElementById('searchWeek').innerHTML = '<option value="">선택하세요</option>';
                    document.getElementById('searchStudent').disabled = true;
                    document.getElementById('searchStudent').innerHTML = '<option value="">전체</option>';
                })
                .catch(function(err) {
                    console.error('학기 목록 로드 오류:', err);
                });
        }

        function loadClassOptions(semesterCd) {
            if (!semesterCd) {
                document.getElementById('searchClass').innerHTML = '<option value="">선택하세요</option>';
                document.getElementById('searchClass').disabled = true;
                return Promise.resolve();
            }
            var promises = userClassIds.map(function(cid) { return db.collection('bta_class').doc(cid).get(); });
            return Promise.all(promises)
                .then(function(docSnaps) {
                    var seen = {};
                    var list = [];
                    docSnaps.forEach(function(ds) {
                        if (!ds.exists) return;
                        var d = ds.data();
                        if ((d.semester_cd || '').toString().trim() !== semesterCd) return;
                        var classCd = (d.class_cd || '').toString().trim();
                        var createYmd = (d.create_ymd || getCurrentDateYmd()).toString().trim();
                        if (!classCd || createYmd.length !== 8) return;
                        var key = classCd;
                        if (seen[key]) return;
                        seen[key] = true;
                        list.push({ class_cd: classCd, create_ymd: createYmd });
                    });
                    return list;
                })
                .then(function(list) {
                    var promises = list.map(function(item) {
                        return getLookupValueName(db, '120', item.class_cd, item.create_ymd)
                            .then(function(nm) { return { value_cd: item.class_cd, value_nm: nm || item.class_cd, create_ymd: item.create_ymd }; })
                            .catch(function() { return { value_cd: item.class_cd, value_nm: item.class_cd, create_ymd: item.create_ymd }; });
                    });
                    return Promise.all(promises);
                })
                .then(function(options) {
                    var sortPromises = options.map(function(o) {
                        return getLookupValueSort(db, '120', o.value_cd, o.create_ymd)
                            .then(function(s) { return { o: o, sortVal: (s != null) ? s : 0 }; })
                            .catch(function() { return { o: o, sortVal: 0 }; });
                    });
                    return Promise.all(sortPromises);
                })
                .then(function(withSort) {
                    withSort.sort(function(a, b) { return a.sortVal - b.sortVal; });
                    var options = withSort.map(function(p) { return p.o; });
                    classCreateYmdMap = {};
                    options.forEach(function(o) { classCreateYmdMap[o.value_cd] = o.create_ymd; });
                    var sel = document.getElementById('searchClass');
                    sel.innerHTML = '';
                    if (options.length === 0) {
                        var emptyOpt = document.createElement('option');
                        emptyOpt.value = '';
                        emptyOpt.textContent = '선택하세요';
                        sel.appendChild(emptyOpt);
                        document.getElementById('searchWeek').innerHTML = '<option value="">선택하세요</option>';
                        document.getElementById('searchWeek').disabled = true;
                        document.getElementById('searchStudent').innerHTML = '<option value="">전체</option>';
                        document.getElementById('searchStudent').disabled = true;
                    } else {
                        options.forEach(function(o) {
                            var opt = document.createElement('option');
                            opt.value = o.value_cd;
                            opt.textContent = o.value_nm;
                            sel.appendChild(opt);
                        });
                        sel.value = options[0].value_cd;
                        loadWeekOptions(semesterCd, options[0].value_cd);
                        loadStudentOptions(semesterCd, options[0].value_cd);
                    }
                    sel.disabled = false;
                })
                .catch(function(err) {
                    console.error('반 목록 로드 오류:', err);
                });
        }

        function loadWeekOptions(semesterCd, classCd) {
            if (!semesterCd || !classCd) {
                document.getElementById('searchWeek').innerHTML = '<option value="">선택하세요</option>';
                document.getElementById('searchWeek').disabled = true;
                return Promise.resolve();
            }
            var today = getCurrentDateYmd();
            return db.collection('bta_task_group')
                .where('semester_cd', '==', semesterCd)
                .where('class_cd', '==', classCd)
                .get()
                .then(function(snap) {
                    var list = [];
                    snap.forEach(function(doc) {
                        var d = doc.data();
                        var viewYmd = (d.view_ymd || '').toString().trim();
                        if (!viewYmd || viewYmd.length !== 8) return;
                        if (viewYmd > today) return;
                        list.push({
                            id: doc.id,
                            week_cd: (d.week_cd || '').toString().trim(),
                            start_ymd: (d.start_ymd || '').toString().trim(),
                            end_ymd: (d.end_ymd || '').toString().trim(),
                            create_ymd: (d.create_ymd || '').toString().trim()
                        });
                    });
                    return list;
                })
                .then(function(list) {
                    var sortPromises = list.map(function(item) {
                        var ymd = item.create_ymd && item.create_ymd.length === 8 ? item.create_ymd : item.start_ymd;
                        if (!item.week_cd || !ymd) return Promise.resolve({ item: item, sortVal: 0 });
                        return getLookupValueSort(db, '230', item.week_cd, ymd)
                            .then(function(s) { return { item: item, sortVal: (s != null) ? s : 0 }; })
                            .catch(function() { return { item: item, sortVal: 0 }; });
                    });
                    return Promise.all(sortPromises);
                })
                .then(function(withSort) {
                    withSort.sort(function(a, b) { return (b.sortVal - a.sortVal); });
                    var labelPromises = withSort.map(function(p) {
                        var item = p.item;
                        if (!item.week_cd) return Promise.resolve('주차 (날짜 없음)');
                        var ymd = item.create_ymd && item.create_ymd.length === 8 ? item.create_ymd : item.start_ymd;
                        if (!ymd) return Promise.resolve(item.week_cd);
                        return getLookupValueName(db, '230', item.week_cd, ymd)
                            .then(function(nm) {
                                var range = (item.start_ymd && item.end_ymd) ? ' (' + formatYmdToDate(item.start_ymd) + ' ~ ' + formatYmdToDate(item.end_ymd) + ')' : '';
                                return (nm || item.week_cd) + range;
                            })
                            .catch(function() {
                                var range = (item.start_ymd && item.end_ymd) ? ' (' + formatYmdToDate(item.start_ymd) + ' ~ ' + formatYmdToDate(item.end_ymd) + ')' : '';
                                return item.week_cd + range;
                            });
                    });
                    return Promise.all(labelPromises).then(function(labels) {
                        return withSort.map(function(p, i) { return { item: p.item, label: labels[i] || p.item.week_cd }; });
                    });
                })
                .then(function(options) {
                    var sel = document.getElementById('searchWeek');
                    sel.innerHTML = '<option value="">선택하세요</option>';
                    options.forEach(function(o) {
                        var opt = document.createElement('option');
                        opt.value = o.item.week_cd;
                        opt.textContent = o.label;
                        sel.appendChild(opt);
                    });
                    sel.disabled = false;
                })
                .catch(function(err) {
                    console.error('주차 목록 로드 오류:', err);
                });
        }

        function loadStudentOptions(semesterCd, classCd) {
            if (!semesterCd || !classCd) {
                document.getElementById('searchStudent').innerHTML = '<option value="">전체</option>';
                document.getElementById('searchStudent').disabled = true;
                return Promise.resolve();
            }
            var classIdsToUse = [];
            return Promise.all(userClassIds.map(function(cid) { return db.collection('bta_class').doc(cid).get(); }))
                .then(function(docSnaps) {
                    docSnaps.forEach(function(ds, i) {
                        if (!ds.exists) return;
                        var d = ds.data();
                        if ((d.semester_cd || '').toString().trim() === semesterCd && (d.class_cd || '').toString().trim() === classCd) {
                            classIdsToUse.push(userClassIds[i]);
                        }
                    });
                    if (classIdsToUse.length === 0) return [];
                    var promises = classIdsToUse.map(function(cid) {
                        return db.collection('bta_class_students').where('class_id', '==', cid).get();
                    });
                    return Promise.all(promises);
                })
                .then(function(qSnaps) {
                    var userIds = [];
                    qSnaps.forEach(function(q) {
                        q.forEach(function(doc) { userIds.push(doc.data().userid || doc.id); });
                    });
                    var seen = {};
                    userIds = userIds.filter(function(uid) { if (seen[uid]) return false; seen[uid] = true; return true; });
                    if (userIds.length === 0) return [];
                    return Promise.all(userIds.map(function(uid) { return db.collection('bta_users').doc(uid).get(); }));
                })
                .then(function(userSnaps) {

        function loadPerformanceData(semesterCd, classCd, weekCd, userid, studentName) {
            if (!performanceGridApi) return;
            performanceGridApi.setGridOption('rowData', []);
            var today = getCurrentDateYmd();
            db.collection('bta_student_task')
                .where('semester_cd', '==', semesterCd)
                .where('class_cd', '==', classCd)
                .where('week_cd', '==', weekCd)
                .where('user_id', '==', userid)
                .get()
                .then(function(snap) {
                    var tasks = [];
                    snap.forEach(function(doc) {
                        var d = doc.data();
                        var sortVal = d.sort;
                        if (sortVal === undefined || sortVal === null || sortVal === '') sortVal = 0;
                        if (typeof sortVal !== 'number') sortVal = parseInt(sortVal, 10) || 0;
                        tasks.push({
                            student_task_id: doc.id,
                            task_cd: (d.task_cd || '').toString().trim(),
                            sort: sortVal,
                            create_ymd: (d.create_ymd || today).toString().trim(),
                            value_cd: (d.value_cd != null ? d.value_cd : '').toString().trim(),
                            score: d.score !== undefined && d.score !== null ? d.score : ''
                        });
                    });
                    tasks.sort(function(a, b) { return (a.sort || 0) - (b.sort || 0); });
                    if (tasks.length === 0) {
                        performanceGridApi.setGridOption('rowData', []);
                        return;
                    }
                    return db.collection('bta_lookup_type').get().then(function(typeSnap) {
                        var typeNmMap = {};
                        typeSnap.forEach(function(doc) {
                            var d = doc.data();
                            var tc = d.type_cd != null ? d.type_cd : doc.id;
                            var tcStr = String(tc).trim();
                            var nm = (d.type_nm || '').toString().trim();
                            if (!nm) return;
                            typeNmMap[tcStr] = nm;
                            if (typeof tc === 'number') typeNmMap[tc] = nm;
                            if (/^\d+$/.test(tcStr)) typeNmMap[parseInt(tcStr, 10)] = nm;
                            typeNmMap[doc.id] = nm;
                            if (String(doc.id).trim()) typeNmMap[String(doc.id).trim()] = nm;
                        });
                        return tasks.map(function(t) {
                            var tc = (t.task_cd || '').toString().trim();
                            var step1 = typeNmMap[tc];
                            var step2 = typeNmMap[String(tc)];
                            var step3 = (typeof tc === 'string' && /^\d+$/.test(tc) ? typeNmMap[parseInt(tc, 10)] : null);
                            var nm = step1 || step2 || step3 || '';
                            return { t: t, task_nm: nm || tc };
                        });
                    });
                })
                .then(function(withNames) {
                    var contentPromises = withNames.map(function(w) {
                        return getLookupValueListWithScore(db, w.t.task_cd, getCurrentDateYmd())
                            .then(function(opts) {
                                return {
                                    student_task_id: w.t.student_task_id,
                                    task_cd: w.t.task_cd,
                                    task_nm: w.task_nm,
                                    create_ymd: w.t.create_ymd,
                                    contentOptions: opts,
                                    value_cd: w.t.value_cd,
                                    value_nm: '',
                                    score: w.t.score
                                };
                            })
                            .catch(function() {
                                return {
                                    student_task_id: w.t.student_task_id,
                                    task_cd: w.t.task_cd,
                                    task_nm: w.task_nm,
                                    create_ymd: w.t.create_ymd,
                                    contentOptions: [],
                                    value_cd: w.t.value_cd,
                                    value_nm: '',
                                    score: w.t.score
                                };
                            });
                    });
                    return Promise.all(contentPromises);
                })
                .then(function(rows) {
                    var valueNmPromises = rows.map(function(r) {
                        if (!r.value_cd) { r.value_nm = ''; return Promise.resolve(r); }
                        return getLookupValueName(db, r.task_cd, r.value_cd, getCurrentDateYmd())
                            .then(function(nm) { r.value_nm = nm || ''; return r; })
                            .catch(function() { r.value_nm = ''; return r; });
                    });
                    return Promise.all(valueNmPromises);
                })
                .then(function(rows) {
                    performanceGridApi.setGridOption('rowData', rows);
                })
                .catch(function(err) {
                    console.error('과제수행도 로드 오류:', err);
                    showMessageModal('과제수행도 데이터를 불러오는 중 오류가 발생했습니다.');
                });
        }

        function savePerformanceData() {
            if (!performanceGridApi) return;
            var rows = [];
            performanceGridApi.forEachNode(function(node) { if (node.data && node.data.student_task_id) rows.push(node.data); });
            if (rows.length === 0) {
                closePerformanceModal();
                return;
            }
            var missing = rows.filter(function(r) {
                var s = r.score;
                return (s !== 0 && s !== '0' && (s === '' || s === undefined || s === null));
            });
            if (missing.length > 0) {
                showMessageModal('모든 과제목록에 점수가 등록되어야 저장됩니다.');
                return;
            }
            var ctx = performanceContext;
            var promises = rows.map(function(r) {
                return db.collection('bta_student_task').doc(r.student_task_id).update({
                    value_cd: r.value_cd || null,
                    score: r.score !== '' && r.score != null ? r.score : (r.score === 0 ? 0 : null)
                });
            });
            var sumScore = 0;
            rows.forEach(function(r) {
                var s = r.score;
                if (s === 0 || s === '0') sumScore += 0;
                else if (s !== '' && s !== undefined && s !== null && !isNaN(Number(s))) sumScore += Number(s);
            });
            Promise.all(promises)
                .then(function() {
                    var docId = buildStudentScoreDocId(ctx.semesterCd, ctx.classCd, ctx.weekCd, ctx.userid);
                    return db.collection('bta_student_score').doc(docId).set({
                        semester_cd: ctx.semesterCd,
                        class_cd: ctx.classCd,
                        week_cd: ctx.weekCd,
                        userid: ctx.userid,
                        task_score: sumScore
                    }, { merge: true });

                .then(function() {

                    } else {

            var meetingScoreNum = parseInt(meetingScore, 10) || 0;
            
            // 점수 조회
            return db.collection('bta_lookup_value')
                .where('type_cd', '==', '310')
                .get()

                    snap.forEach(function(doc) {
                        var d = doc.data();
                        scoreMap[d.value_cd] = d.score != null ? d.score : 0;
                    });
                    
                    var classScoreVal = scoreMap[classScore] || 0;
                    var meetingScoreVal = scoreMap[meetingScore] || 0;
                    var qualitativeTotal = classScoreVal + meetingScoreVal;

                    return db.collection('bta_student_score').doc(docId).set({
                        semester_cd: ctx.semesterCd,

                        week_cd: ctx.weekCd,
                        userid: ctx.userid,

        var comprehensiveAssessmentOptions = [];

        function openComprehensiveModal(semesterCd, classCd, userid, studentName) {

        function loadComprehensiveData() {
            var ctx = comprehensiveContext;
            if (comprehensiveGridApi) comprehensiveGridApi.setGridOption('rowData', []);

            db.collection('bta_student_score')
                .where('semester_cd', '==', ctx.semesterCd)
                .where('class_cd', '==', ctx.classCd)
                .where('userid', '==', ctx.userid)
                .get()
                .then(function(snap) {
                    var today = getCurrentDateYmd();
                    var rows = [];
                    snap.forEach(function(doc) {
                        var d = doc.data();
                        var createYmd = (d.create_ymd || '').toString().trim();
                        if (createYmd.length !== 8) createYmd = today;
                        var taskScore = (d.task_score !== null && d.task_score !== undefined && d.task_score !== '') ? (Number(d.task_score) || 0) : 0;
                        var qual = (d.qualitative !== null && d.qualitative !== undefined && d.qualitative !== '') ? (Number(d.qualitative) || 0) : 0;
                        var total = taskScore + qual;
                        var cum = (d.cumulative_score !== null && d.cumulative_score !== undefined && d.cumulative_score !== '') ? (Number(d.cumulative_score) || 0) : 0;
                        var totalAssessment = (d.total_assessment != null && d.total_assessment !== '') ? String(d.total_assessment).trim() : '';
                        var oldCumScore = (d.old_cumulative_score !== null && d.old_cumulative_score !== undefined && d.old_cumulative_score !== '') ? Number(d.old_cumulative_score) : null;
                        if (typeof oldCumScore !== 'number' || isNaN(oldCumScore)) oldCumScore = null;
                        rows.push({
                            docId: doc.id,
                            week_cd: (d.week_cd || '').toString().trim(),
                            create_ymd: createYmd,
                            task_score: taskScore,
                            qualitative: qual,
                            total: total,
                            cumulative_score: cum,
                            total_assessment: totalAssessment,
                            old_cumulative_score: oldCumScore,
                            remarkText: '',
                            cumHighlight: false
                        });
                    });
                    return Promise.all(rows.map(function(r) {
                        return getLookupValueSort(db, '230', r.week_cd, r.create_ymd).then(function(sortVal) {
                            r._sort = (sortVal != null && sortVal !== '') ? (Number(sortVal) || 0) : 0;
                            return getLookupValueName(db, '230', r.week_cd, r.create_ymd).then(function(nm) {
                                r.week_nm = nm || r.week_cd || '';
                                return r;
                            });
                        });
                    })).then(function() {
                        rows.sort(function(a, b) { return (a._sort || 0) - (b._sort || 0); });
                        comprehensiveRows = rows;
                        return getLookupValueList(db, '320', today);
                    });
                })
                .then(function(assessmentOptions) {
                    comprehensiveAssessmentOptions = assessmentOptions || [];
                    comprehensiveRows.forEach(function(r) {
                        if (r.old_cumulative_score != null && r.cumulative_score !== r.old_cumulative_score) {
                            r.remarkText = '이전 누적점수 : ' + r.old_cumulative_score;
                            r.cumHighlight = true;
                        }
                    });
                    if (comprehensiveGridApi) comprehensiveGridApi.setGridOption('rowData', comprehensiveRows);
                })
                .catch(function(err) {
                    console.error('종합평가 데이터 로드 오류:', err);
                    showMessageModal('종합평가 데이터를 불러오는 중 오류가 발생했습니다.');
                });
        }

        function recalcCumulativeComprehensive() {
            if (!comprehensiveGridApi) return;
            var rowData = [];
            comprehensiveGridApi.forEachNode(function(node) {
                if (node.data) rowData.push(node.data);
            });
            var cum = 0;
            rowData.forEach(function(r) {
                var total = (r.total !== null && r.total !== undefined) ? Number(r.total) : 0;
                cum = total + cum;
                r.cumulative_score = cum;
            });
            rowData.forEach(function(r) {
                r.remarkText = '';
                r.cumHighlight = false;
                if (r.old_cumulative_score == null) return;
                if (r.cumulative_score === r.old_cumulative_score) return;
                r.remarkText = '이전 누적점수 : ' + r.old_cumulative_score;
                r.cumHighlight = true;
            });
            comprehensiveGridApi.setGridOption('rowData', rowData);
        }

        function saveComprehensiveModal() {
            if (!comprehensiveGridApi) return;
            var rowData = [];
            comprehensiveGridApi.forEachNode(function(node) {
                if (node.data) rowData.push(node.data);
            });
            var empty = rowData.some(function(r) {
                var v = (r.total_assessment != null && r.total_assessment !== '') ? String(r.total_assessment).trim() : '';
                return v === '';
            });
            if (empty) {
                showMessageModal('종합평가는 모두 점수가 등록되어 있어야 합니다.');
                return;
            }
            var today = getCurrentDateYmd();
            var promises = rowData.map(function(r) {
                var createYmd = (r.create_ymd || '').toString().trim();
                if (createYmd.length !== 8) createYmd = today;
                return db.collection('bta_student_score').doc(r.docId).update({
                    create_ymd: createYmd,
                    total_assessment: (r.total_assessment || '').toString().trim(),
                    cumulative_score: r.cumulative_score,
                    old_cumulative_score: r.cumulative_score,
                    old_total_assessment: firebase.firestore.FieldValue.delete()
                });
            });
            Promise.all(promises)
                .then(function() {
                    showMessageModal('저장되었습니다.');
                    closeComprehensiveModal();
                    var semester = document.getElementById('searchSemester').value;
                    var cls = document.getElementById('searchClass').value;
                    var week = document.getElementById('searchWeek').value;
                    var student = document.getElementById('searchStudent').value;
                    if (semester && cls && week) loadAssignmentSubmitData(semester, cls, week, student || '');
                })
                .catch(function(err) {
                    console.error('종합평가 저장 오류:', err);
                    showMessageModal('저장 중 오류가 발생했습니다.');
                });
        }

        function closeComprehensiveModal() {
            document.getElementById('comprehensiveModal').style.display = 'none';
        }

        function exportComprehensiveToExcel() {
            if (!comprehensiveGridApi) return;
            var rowData = [];
            comprehensiveGridApi.forEachNode(function(node) { if (node.data) rowData.push(node.data); });
            if (rowData.length === 0) {
                showMessageModal('다운로드할 데이터가 없습니다.');
                return;
            }
            var opts = comprehensiveAssessmentOptions || [];
            var exportData = rowData.map(function(r) {
                var assessmentNm = (r.total_assessment && opts.length) ? ((opts.find(function(o) { return (o.value_cd || '') === (r.total_assessment || ''); }) || {}).value_nm || r.total_assessment) : (r.total_assessment || '');
                return {
                    '주차': r.week_nm != null ? r.week_nm : '',
                    '과제점수': r.task_score != null ? r.task_score : '',
                    '정성점수': r.qualitative != null ? r.qualitative : '',
                    '합계': r.total != null ? r.total : '',
                    '누적점수': r.cumulative_score != null ? r.cumulative_score : '',
                    '종합평가': assessmentNm,
                    '비고': r.remarkText != null ? r.remarkText : ''
                };
            });
            var ws = XLSX.utils.json_to_sheet(exportData);
            var wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, '종합평가');
            var nameEl = document.getElementById('comprehensiveModalStudentName');
            var studentName = (nameEl && nameEl.textContent) ? nameEl.textContent.replace(/^\(성명\s*:\s*|\s*\)$/g, '').trim() : '데이터';
            var fileName = '종합평가_' + (studentName || '데이터') + '_' + new Date().toISOString().slice(0, 10).replace(/-/g, '') + '.xlsx';
            XLSX.writeFile(wb, fileName);
        }

        function validateSearchCondition() {
            var semester = document.getElementById('searchSemester').value;
            var cls = document.getElementById('searchClass').value;
            var week = document.getElementById('searchWeek').value;
            if (!semester) {
                showMessageModal('학기를 선택해주세요.');
                return false;
            }
            if (!cls) {
                showMessageModal('반을 선택해주세요.');
                return false;
            }
            if (!week) {
                showMessageModal('주차를 선택해주세요.');
                return false;
            }
            return true;
        }

        var assignmentSubmitGridApi = null;
        /** 마지막 조회 성공 시 학기·반·주차 (훈련생 필터 미포함) */
        var coachAssignmentSubmitSearchSnapshot = null;

        function coachAssignmentSubmitGridRowCount() {
            if (!assignmentSubmitGridApi) return 0;
            var n = 0;
            assignmentSubmitGridApi.forEachNode(function() { n++; });
            return n;
        }

        function commitCoachAssignmentSubmitSnapshot(semesterCd, classCd, weekCd) {
            coachAssignmentSubmitSearchSnapshot = {
                semesterCd: (semesterCd || '').toString(),
                classCd: (classCd || '').toString(),
                weekCd: (weekCd || '').toString()
            };
        }

        function clearCoachAssignmentSubmitSnapshot() {
            coachAssignmentSubmitSearchSnapshot = null;
        }

        function canProceedCoachAssignmentSubmitAction() {
            var semester = document.getElementById('searchSemester').value;
            var cls = document.getElementById('searchClass').value;
            var week = document.getElementById('searchWeek').value;
            if (!semester || !cls || !week) {
                showMessageModal('학기, 반, 주차를 선택한 후 조회해주세요.');
                return false;
            }
            var snap = coachAssignmentSubmitSearchSnapshot;
            if (snap === null) {
                if (coachAssignmentSubmitGridRowCount() === 0) {
                    showMessageModal('학기, 반, 주차를 선택한 후 조회해주세요.');
                    return false;
                }
                showMessageModal('학기, 반, 주차를 조회해 주세요.');
                return false;
            }
            if (semester !== snap.semesterCd || cls !== snap.classCd || week !== snap.weekCd) {
                showMessageModal('학기, 반, 주차를 조회해 주세요.');
                return false;
            }
            return true;
        }

        function loadAssignmentSubmitData(semesterCd, classCd, weekCd, filterUserid) {
            if (!assignmentSubmitGridApi) return;
            assignmentSubmitGridApi.setGridOption('rowData', []);
            assignmentSubmitGridApi.setGridOption('columnDefs', columnDefs);

            var query = db.collection('bta_class_students')
                .where('semester_cd', '==', semesterCd)
                .where('class_cd', '==', classCd);
            query.get()
                .then(function(csSnap) {
                    var userIds = [];
                    csSnap.forEach(function(doc) {
                        var uid = (doc.data().userid || doc.id || '').toString().trim();
                        if (!uid) return;
                        if (filterUserid && uid !== filterUserid) return;
                        userIds.push(uid);
                    });
                    var seen = {};
                    userIds = userIds.filter(function(uid) {
                        if (seen[uid]) return false;
                        seen[uid] = true;
                        return true;
                    });
                    if (userIds.length === 0) {
                        assignmentSubmitGridApi.setGridOption('rowData', []);
                        commitCoachAssignmentSubmitSnapshot(semesterCd, classCd, weekCd);
                        return;
                    }
                    return Promise.all(userIds.map(function(uid) { return db.collection('bta_users').doc(uid).get(); }))
                        .then(function(userSnaps) {
                            var users = [];
                            userSnaps.forEach(function(us, i) {
                                if (!us.exists) return;
                                var u = us.data();
                                if ((u.user_type || '').toString().trim() !== '100') return;
                                users.push({
                                    userid: userIds[i],
                                    name: (u.name || '').toString().trim(),
                                    phone: (u.phone || '').toString().trim()
                                });
                            });
                            return users;
                        })
                        .then(function(users) {
                            return db.collection('bta_student_score')
                                .where('semester_cd', '==', semesterCd)
                                .where('class_cd', '==', classCd)
                                .where('week_cd', '==', weekCd)
                                .get()
                                .then(function(scoreSnap) {
                                    var scoreByUser = {};
                                    scoreSnap.forEach(function(doc) {
                                        var d = doc.data();
                                        var uid = (d.userid || d.user_id || '').toString().trim();
                                        if (!uid) return;
                                        var createYmd = (d.create_ymd || '').toString().trim();
                                        if (createYmd.length !== 8) createYmd = getCurrentDateYmd();
                                        scoreByUser[uid] = {
                                            task_score: d.task_score,
                                            qualitative: d.qualitative,
                                            cumulative_score: d.cumulative_score,
                                            total_assessment: d.total_assessment,
                                            create_ymd: createYmd,
                                            bible_mark: d.bible_mark
                                        };
                                    });
                                    var today = getCurrentDateYmd();
                                    var rowPromises = users.map(function(u) {
                                        var sc = scoreByUser[u.userid] || {};
                                        var ts = sc.task_score;
                                        var qs = sc.qualitative;
                                        var cs = sc.cumulative_score;
                                        var oe = sc.total_assessment;
                                        var createYmd = (sc.create_ymd || '').toString().trim();
                                        if (createYmd.length !== 8) createYmd = today;
                                        var bm = sc.bible_mark;
                                        var baseRow = {
                                            userid: u.userid,
                                            name: u.name,
                                            phone: u.phone,
                                            task_score: (ts !== null && ts !== undefined && ts !== '') ? (isNaN(Number(ts)) ? null : Number(ts)) : null,
                                            qual_score: (qs !== null && qs !== undefined && qs !== '') ? (isNaN(Number(qs)) ? null : Number(qs)) : null,
                                            cumulative_score: (cs !== null && cs !== undefined && cs !== '') ? (isNaN(Number(cs)) ? null : Number(cs)) : null,
                                            overall_eval: (oe !== null && oe !== undefined && oe !== '') ? oe : null,
                                            bible_mark: bm
                                        };
                                        if (!oe && oe !== 0) return Promise.resolve(baseRow);
                                        return getLookupValueName(db, '320', String(oe).trim(), createYmd)
                                            .then(function(nm) {
                                                baseRow.overall_eval = (nm != null && nm !== '') ? nm : oe;
                                                return baseRow;
                                            })
                                            .catch(function() { return baseRow; });
                                    });
                                    return Promise.all(rowPromises).then(function(rows) {
                                        rows.sort(function(a, b) { return (a.name || '').localeCompare(b.name || ''); });
                                        assignmentSubmitGridApi.setGridOption('rowData', rows);
                                        commitCoachAssignmentSubmitSnapshot(semesterCd, classCd, weekCd);
                                    });
                                })
                                .catch(function(err) {
                                    var rows = users.map(function(u) {
                                        return {
                                            userid: u.userid,
                                            name: u.name,
                                            phone: u.phone,
                                            task_score: null,
                                            qual_score: null,
                                            cumulative_score: null,
                                            overall_eval: null,
                                            bible_mark: null
                                        };
                                    });
                                    rows.sort(function(a, b) { return (a.name || '').localeCompare(b.name || ''); });
                                    assignmentSubmitGridApi.setGridOption('rowData', rows);
                                    commitCoachAssignmentSubmitSnapshot(semesterCd, classCd, weekCd);
                                });
                        });
                })
                .catch(function(err) {
                    console.error('과제제출확인 조회 오류:', err);
                    clearCoachAssignmentSubmitSnapshot();
                    showMessageModal('조회 중 오류가 발생했습니다.');
                });
        }

        document.addEventListener('DOMContentLoaded', function() {
            const gridEl = document.querySelector('#assignmentSubmitGrid');
            if (gridEl) assignmentSubmitGridApi = agGrid.createGrid(gridEl, gridOptions);

            var perfGridEl = document.querySelector('#performanceGrid');
            if (perfGridEl) {
                performanceGridApi = agGrid.createGrid(perfGridEl, performanceGridOptions);
                perfGridEl.addEventListener('change', function(ev) {
                    var sel = ev.target && ev.target.classList && ev.target.classList.contains('performance-content-select') ? ev.target : null;
                    if (!sel || !performanceGridApi) return;
                    var nodeId = sel.getAttribute('data-node-id');
                    if (nodeId === '' || nodeId === null) return;
                    var rowNode = performanceGridApi.getRowNode(nodeId);
                    if (!rowNode || !rowNode.data) return;
                    var opt = sel.options[sel.selectedIndex];
                    rowNode.data.value_cd = opt ? opt.value : '';
                    rowNode.data.value_nm = opt ? (opt.getAttribute('data-nm') || '').replace(/&quot;/g, '"') : '';
                    var scoreAttr = opt ? opt.getAttribute('data-score') : '';
                    var num = scoreAttr !== '' && scoreAttr !== null ? parseInt(scoreAttr, 10) : NaN;
                    rowNode.data.score = (!isNaN(num)) ? num : '';
                    performanceGridApi.refreshCells({ columns: ['score'], rowNodes: [rowNode] });
                });
            }

            var compGridEl = document.querySelector('#comprehensiveGrid');
            if (compGridEl) {
                comprehensiveGridApi = agGrid.createGrid(compGridEl, comprehensiveGridOptions);
                compGridEl.addEventListener('change', function(ev) {
                    var sel = ev.target && ev.target.classList && ev.target.classList.contains('comprehensive-assessment-select') ? ev.target : null;
                    if (!sel || !comprehensiveGridApi) return;
                    var nodeId = sel.getAttribute('data-node-id');
                    if (nodeId === '' || nodeId === null) return;
                    var rowNode = comprehensiveGridApi.getRowNode(nodeId);
                    if (!rowNode || !rowNode.data) return;
                    rowNode.data.total_assessment = sel.value || '';
                    comprehensiveGridApi.refreshCells({ columns: ['total_assessment'], rowNodes: [rowNode] });
                });
            }

            document.getElementById('performanceModalClose').addEventListener('click', closePerformanceModal);
            document.getElementById('performanceCancelButton').addEventListener('click', closePerformanceModal);
            document.getElementById('performanceSaveButton').addEventListener('click', savePerformanceData);
            document.getElementById('performanceTempSaveButton').addEventListener('click', savePerformanceDataTemp);

            // 기록과제물 모달 닫기 버튼만 연결 (나머지는 openRecordTaskModal에서 동적으로 추가)
            document.getElementById('recordTaskModalClose').addEventListener('click', closeRecordTaskModal);

            // 정성평가 모달 닫기 버튼 연결
            document.getElementById('qualitativeModalClose').addEventListener('click', closeQualitativeModal);

            // 종합평가 모달
            document.getElementById('comprehensiveModalClose').addEventListener('click', closeComprehensiveModal);
            document.getElementById('comprehensiveCancelButton').addEventListener('click', closeComprehensiveModal);
            document.getElementById('comprehensiveExportExcelButton').addEventListener('click', exportComprehensiveToExcel);
            document.getElementById('comprehensiveCalcButton').addEventListener('click', recalcCumulativeComprehensive);
            document.getElementById('comprehensiveSaveButton').addEventListener('click', saveComprehensiveModal);

            var searchBtn = document.getElementById('searchButton');
            if (searchBtn) {
                searchBtn.addEventListener('click', function() {
                    if (!validateSearchCondition()) return;
                    var semester = document.getElementById('searchSemester').value;
                    var cls = document.getElementById('searchClass').value;
                    var week = document.getElementById('searchWeek').value;
                    var student = document.getElementById('searchStudent').value;
                    loadAssignmentSubmitData(semester, cls, week, student || '');
                });
            }

            var semesterSel = document.getElementById('searchSemester');
            if (semesterSel) {
                semesterSel.addEventListener('change', function() {
                    var v = this.value;
                    document.getElementById('searchClass').innerHTML = '<option value="">선택하세요</option>';
                    document.getElementById('searchClass').disabled = true;
                    document.getElementById('searchWeek').innerHTML = '<option value="">선택하세요</option>';
                    document.getElementById('searchWeek').disabled = true;
                    document.getElementById('searchStudent').innerHTML = '<option value="">전체</option>';
                    document.getElementById('searchStudent').disabled = true;
                    if (v) loadClassOptions(v);
                });
            }

            var classSel = document.getElementById('searchClass');
            if (classSel) {
                classSel.addEventListener('change', function() {
                    var semester = document.getElementById('searchSemester').value;
                    var classCd = this.value;
                    document.getElementById('searchWeek').innerHTML = '<option value="">선택하세요</option>';
                    document.getElementById('searchWeek').disabled = true;
                    document.getElementById('searchStudent').innerHTML = '<option value="">전체</option>';
                    document.getElementById('searchStudent').disabled = true;
                    if (semester && classCd) {
                        loadWeekOptions(semester, classCd);
                        loadStudentOptions(semester, classCd);
                    }
                });
            }
        });

        auth.onAuthStateChanged(function(user) {
            if (!user) {
                window.location.href = '/login';
                return;
            }
            loadSemesterOptions();
        });
    </script>
</body>
</html>
