<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 재설정 - BTA</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="logo">
                <div class="logo-circle">
                    <div class="logo-text-top">비전</div>
                    <div class="logo-cross">✚</div>
                    <div class="logo-text-bottom">통독</div>
                </div>
            </div>
            
            <h1 class="login-title">비밀번호 재설정</h1>
            
            <form id="resetForm" class="login-form">
                <div class="input-group">
                    <span class="input-icon">✉</span>
                    <input type="email" id="email" placeholder="이메일" required>
                </div>
                
                <button type="submit" class="login-button">재설정 이메일 보내기</button>
            </form>
            
            <div class="login-links">
                <a href="/login" class="link">로그인으로 돌아가기</a>
            </div>
            
            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>
        </div>
    </div>
    
    <script>
        const firebaseConfig = {
            apiKey: "{{ firebase_config.api_key if firebase_config else '' }}",
            projectId: "{{ firebase_config.project_id if firebase_config else '' }}",
            storageBucket: "{{ firebase_config.storage_bucket if firebase_config else '' }}"
        };
        
        if (firebaseConfig.apiKey && firebaseConfig.projectId) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const auth = firebase.auth();
        
        document.getElementById('resetForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');
            
            errorMessage.textContent = '';
            errorMessage.style.display = 'none';
            successMessage.textContent = '';
            successMessage.style.display = 'none';
            
            try {
                await auth.sendPasswordResetEmail(email);
                successMessage.textContent = '비밀번호 재설정 이메일을 보냈습니다. 이메일을 확인해주세요.';
                successMessage.style.display = 'block';
            } catch (error) {
                let errorText = '이메일 전송에 실패했습니다.';
                if (error.code === 'auth/user-not-found') {
                    errorText = '등록되지 않은 이메일입니다.';
                } else if (error.code === 'auth/invalid-email') {
                    errorText = '유효하지 않은 이메일 형식입니다.';
                }
                errorMessage.textContent = errorText;
                errorMessage.style.display = 'block';
            }
        });
    </script>
</body>
</html>
