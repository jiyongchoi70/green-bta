<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - BTA</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="logo">
                <div class="logo-circle">
                    <div class="logo-text-top">BTA</div>
                    <div class="logo-cross">✚</div>
                    <div class="logo-text-bottom">GT</div>
                </div>
            </div>
            
            <h1 class="login-title">회원가입</h1>
            
            <form id="signupForm" class="login-form">
                <div class="input-group">
                    <span class="input-icon">👤</span>
                    <input type="text" id="name" placeholder="성명" required>
                </div>
                
                <div class="input-group">
                    <span class="input-icon">📞</span>
                    <input type="tel" id="phone" placeholder="전화번호 (예: 010-1234-5678)" required>
                </div>
                
                <div class="input-group">
                    <span class="input-icon">✉</span>
                    <input type="email" id="email" placeholder="이메일" required>
                </div>
                
                <div class="input-group">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="password" placeholder="비밀번호" required minlength="6">
                    <span class="toggle-password" id="togglePassword" title="비밀번호 보기">👁</span>
                </div>
                
                <div class="input-group">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="confirmPassword" placeholder="비밀번호 확인" required>
                    <span class="toggle-password" id="toggleConfirmPassword" title="비밀번호 보기">👁</span>
                </div>
                
                <button type="submit" class="login-button">회원가입</button>
            </form>
            
            <div class="login-links">
                <a href="/login" class="link">이미 계정이 있으신가요? 로그인</a>
            </div>
            
            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>
        </div>
    </div>
    
    <script>
        const firebaseConfig = {
            apiKey: "{{ firebase_config.api_key if firebase_config else '' }}",
            projectId: "{{ firebase_config.project_id if firebase_config else '' }}",
            storageBucket: "{{ firebase_config.storage_bucket if firebase_config else '' }}"
        };
        
        if (firebaseConfig.apiKey && firebaseConfig.projectId) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        function formatPhoneNumber(value) {
            const numbers = value.replace(/[^\d]/g, '');
            if (numbers.length <= 3) return numbers;
            if (numbers.length <= 7) return numbers.slice(0, 3) + '-' + numbers.slice(3);
            if (numbers.length <= 11) return numbers.slice(0, 3) + '-' + numbers.slice(3, 7) + '-' + numbers.slice(7);
            return numbers.slice(0, 3) + '-' + numbers.slice(3, 7) + '-' + numbers.slice(7, 11);
        }
        
        document.getElementById('phone').addEventListener('input', function(e) {
            const formatted = formatPhoneNumber(e.target.value);
            e.target.value = formatted;
        });
        
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
        });
        
        document.getElementById('toggleConfirmPassword').addEventListener('click', function() {
            const confirmInput = document.getElementById('confirmPassword');
            const type = confirmInput.getAttribute('type') === 'password' ? 'text' : 'password';
            confirmInput.setAttribute('type', type);
        });
        
        document.getElementById('signupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value.trim();
            let phone = document.getElementById('phone').value.trim();
            phone = phone.replace(/[^\d]/g, '');
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');
            
            errorMessage.textContent = '';
            errorMessage.style.display = 'none';
            successMessage.textContent = '';
            successMessage.style.display = 'none';
            
            if (!name) {
                errorMessage.textContent = '성명을 입력해주세요.';
                errorMessage.style.display = 'block';
                return;
            }
            
            if (!phone) {
                errorMessage.textContent = '전화번호를 입력해주세요.';
                errorMessage.style.display = 'block';
                return;
            }
            
            if (phone.length < 10 || phone.length > 11) {
                errorMessage.textContent = '전화번호는 10자리 또는 11자리여야 합니다.';
                errorMessage.style.display = 'block';
                return;
            }
            
            if (password !== confirmPassword) {
                errorMessage.textContent = '비밀번호가 일치하지 않습니다.';
                errorMessage.style.display = 'block';
                return;
            }
            
            if (password.length < 6) {
                errorMessage.textContent = '비밀번호는 최소 6자 이상이어야 합니다.';
                errorMessage.style.display = 'block';
                return;
            }
            
            try {
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;
                
                const formattedPhone = phone.length === 10 
                    ? phone.slice(0, 3) + '-' + phone.slice(3, 6) + '-' + phone.slice(6)
                    : phone.slice(0, 3) + '-' + phone.slice(3, 7) + '-' + phone.slice(7);
                
                await db.collection('bta_users').doc(user.uid).set({
                    userId: user.uid,
                    name: name,
                    phone: formattedPhone,
                    email: email,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                successMessage.textContent = '회원가입이 완료되었습니다! 홈페이지로 이동합니다.';
                successMessage.style.display = 'block';
                
                setTimeout(function() {
                    window.location.href = '/';
                }, 2000);
            } catch (error) {
                let errorText = '회원가입에 실패했습니다.';
                if (error.code === 'auth/email-already-in-use') {
                    errorText = '이미 사용 중인 이메일입니다.';
                } else if (error.code === 'auth/invalid-email') {
                    errorText = '유효하지 않은 이메일 형식입니다.';
                } else if (error.code === 'auth/weak-password') {
                    errorText = '비밀번호가 너무 약합니다.';
                }
                errorMessage.textContent = errorText;
                errorMessage.style.display = 'block';
            }
        });
    </script>
</body>
</html>
