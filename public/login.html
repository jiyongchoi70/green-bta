<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - BTA</title>
    <link rel="stylesheet" href="static/login.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="logo">
                <div class="logo-circle">
                    <div class="logo-text-top">BTA</div>
                    <div class="logo-cross">✚</div>
                    <div class="logo-text-bottom">GT</div>
                </div>
            </div>
            
            <h1 class="login-title">BTA 로그인</h1>
            
            <form id="loginForm" class="login-form">
                <div class="input-group">
                    <span class="input-icon">✉</span>
                    <input type="email" id="email" placeholder="이메일" required>
                </div>
                
                <div class="input-group">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="password" placeholder="비밀번호" required>
                    <span class="toggle-password" id="togglePassword">👁</span>
                </div>
                
                <button type="submit" class="login-button">로그인</button>
            </form>
            
            <div class="login-links">
                <a href="forgot-password.html" class="link">비밀번호를 잊으셨나요?</a>
                <a href="signup.html" class="link">계정이 없으신가요? 회원가입</a>
            </div>
            
            <div id="errorMessage" class="error-message"></div>
        </div>
    </div>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBQQ5pAccety6OewHpZFbKh8WMrVJb6Kxg",
            projectId: "greentree-bta",
            storageBucket: "greentree-bta.firebasestorage.app"
        };
        
        if (firebaseConfig.apiKey && firebaseConfig.projectId) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const auth = firebase.auth();
        
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
        });
        
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');
            
            errorMessage.textContent = '';
            errorMessage.style.display = 'none';
            
            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                window.location.href = 'index.html';
            } catch (error) {
                let errorText = '로그인에 실패했습니다.';
                if (error.code === 'auth/user-not-found') {
                    errorText = '등록되지 않은 이메일입니다.';
                } else if (error.code === 'auth/wrong-password') {
                    errorText = '비밀번호가 올바르지 않습니다.';
                } else if (error.code === 'auth/invalid-email') {
                    errorText = '유효하지 않은 이메일 형식입니다.';
                } else if (error.code === 'auth/user-disabled') {
                    errorText = '계정이 비활성화되었습니다.';
                }
                errorMessage.textContent = errorText;
                errorMessage.style.display = 'block';
            }
        });
        
        auth.onAuthStateChanged(function(user) {
            if (user) {
                if (window.location.pathname === '/login' || window.location.pathname === '/signup') {
                    window.location.href = 'index.html';
                }
            }
        });
    </script>
</body>
</html>
