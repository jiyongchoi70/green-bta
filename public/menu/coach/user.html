<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사용자 관리 - BTA</title>
    <link rel="stylesheet" href="../../static/style.css">
    <link rel="stylesheet" href="../../static/user.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ag-grid-community@31.0.0/dist/ag-grid-community.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31.0.0/styles/ag-grid.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31.0.0/styles/ag-theme-alpine.css">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="../../static/common_code_util.js"></script>
</head>
<body>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBQQ5pAccety6OewHpZFbKh8WMrVJb6Kxg",
            projectId: "greentree-bta",
            storageBucket: "greentree-bta.firebasestorage.app"
        };
        
        if (firebaseConfig.apiKey && firebaseConfig.projectId) {
            firebase.initializeApp(firebaseConfig);
        }
    </script>
    <div class="container">
        <div class="announcements-header">
            <h1 class="page-title">사용자 관리</h1>
            <a href="../../" class="home-button">홈</a>
        </div>
        
        <div class="user-management-container">
            <div class="search-section">
                <div class="search-fields">
                    <div class="search-left">
                        <div class="search-field">
                            <label>성명</label>
                            <input type="text" id="searchName" class="search-input" placeholder="성명 입력">
                        </div>
                        <div class="search-field">
                            <label>전화번호</label>
                            <input type="text" id="searchPhone" class="search-input" placeholder="전화번호 입력">
                        </div>
                        <div class="search-field">
                            <label>사용자구분</label>
                            <select id="searchUserType" class="search-select">
                                <option value="">전체</option>
                            </select>
                        </div>
                        <div class="search-field">
                            <label>재학구분</label>
                            <select id="searchStudentStatus" class="search-select">
                                <option value="">전체</option>
                            </select>
                        </div>
                        <button id="searchButton" class="search-button">조회</button>
                    </div>
                    <div class="search-right">
                        <button id="exportExcelButton" class="export-excel-button">엑셀 다운로드</button>
                        <button id="addButton" class="add-button">+</button>
                    </div>
                </div>
            </div>
            
            <div id="userGrid" class="ag-theme-alpine"></div>
        </div>
    </div>
    
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">사용자 등록</h3>
                <span class="close-button">&times;</span>
            </div>
            <div class="modal-body">
                <table class="modal-form">
                    <tr>
                        <td>성명</td>
                        <td>
                            <input type="text" id="modalName" class="modal-input" maxlength="50" readonly>
                        </td>
                    </tr>
                    <tr>
                        <td>이메일</td>
                        <td>
                            <input type="email" id="modalEmail" class="modal-input" maxlength="100" readonly>
                        </td>
                    </tr>
                    <tr>
                        <td>전화번호</td>
                        <td>
                            <input type="text" id="modalPhone" class="modal-input" maxlength="20">
                        </td>
                    </tr>
                    <tr>
                        <td>사용자구분</td>
                        <td>
                            <select id="modalUserType" class="modal-select">
                                <option value="">선택하세요</option>
                            </select>
                        </td>
                    </tr>
                    <tr>
                        <td>재학구분</td>
                        <td>
                            <select id="modalStudentStatus" class="modal-select">
                                <option value="">선택하세요</option>
                            </select>
                        </td>
                    </tr>
                    <tr>
                        <td>학교</td>
                        <td>
                            <input type="text" id="modalSchool" class="modal-input" maxlength="100">
                        </td>
                    </tr>
                    <tr>
                        <td>비고</td>
                        <td>
                            <input type="text" id="modalRemark" class="modal-input" maxlength="200">
                        </td>
                    </tr>
                </table>
            </div>
            <div class="modal-footer">
                <button id="saveButton" class="save-button">저장</button>
                <button id="cancelButton" class="cancel-button">취소</button>
            </div>
        </div>
    </div>
    
    <script>
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        let isEditMode = false;
        let editDocumentId = null;
        let userTypeList = [];
        let studentStatusList = [];
        let allUserData = [];
        
        function getCurrentDateYmd() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            return year + month + day;
        }
        
        function loadLookupLists() {
            const currentDate = getCurrentDateYmd();
            
            Promise.all([
                getLookupValueList(db, '110', currentDate),
                getLookupValueList(db, '130', currentDate)
            ]).then(function(results) {
                userTypeList = results[0] || [];
                studentStatusList = results[1] || [];
                
                const userTypeSelect = document.getElementById('modalUserType');
                userTypeSelect.innerHTML = '<option value="">선택하세요</option>';
                userTypeList.forEach(function(item) {
                    const option = document.createElement('option');
                    option.value = item.value_cd;
                    option.textContent = item.value_nm;
                    userTypeSelect.appendChild(option);
                });
                
                const studentStatusSelect = document.getElementById('modalStudentStatus');
                studentStatusSelect.innerHTML = '<option value="">선택하세요</option>';
                studentStatusList.forEach(function(item) {
                    const option = document.createElement('option');
                    option.value = item.value_cd;
                    option.textContent = item.value_nm;
                    studentStatusSelect.appendChild(option);
                });
                
                // 조회 조건용 사용자구분 드롭다운
                const searchUserTypeSelect = document.getElementById('searchUserType');
                if (searchUserTypeSelect) {
                    searchUserTypeSelect.innerHTML = '<option value="">전체</option>';
                    userTypeList.forEach(function(item) {
                        const option = document.createElement('option');
                        option.value = item.value_cd;
                        option.textContent = item.value_nm;
                        searchUserTypeSelect.appendChild(option);
                    });
                }
                
                // 조회 조건용 재학구분 드롭다운
                const searchStudentStatusSelect = document.getElementById('searchStudentStatus');
                if (searchStudentStatusSelect) {
                    searchStudentStatusSelect.innerHTML = '<option value="">전체</option>';
                    studentStatusList.forEach(function(item) {
                        const option = document.createElement('option');
                        option.value = item.value_cd;
                        option.textContent = item.value_nm;
                        searchStudentStatusSelect.appendChild(option);
                    });
                }
            }).catch(function(error) {
                console.error('공통코드 로드 오류:', error);
            });
        }
        
        const columnDefs = [
            {
                headerName: '순서',
                width: 60,
                sortable: false,
                valueGetter: function(params) {
                    if (!params.node) return '';
                    try {
                        const api = params.api;
                        const pageSize = api.getPaginationPageSize ? api.getPaginationPageSize() : 100;
                        const currentPage = api.paginationGetCurrentPage ? api.paginationGetCurrentPage() : 0;
                        return (currentPage * pageSize) + params.node.rowIndex + 1;
                    } catch (e) {
                        return (params.node.rowIndex ?? 0) + 1;
                    }
                }
            },
            { field: 'name', headerName: '성명', width: 100, sortable: true },
            { field: 'email', headerName: '이메일', width: 200, sortable: true },
            { field: 'phone', headerName: '전화번호', width: 150, sortable: true },
            { field: 'user_type_nm', headerName: '사용자구분', width: 110, sortable: true },
            { field: 'student_status_nm', headerName: '재학구분', width: 90, sortable: true },
            { field: 'user_school', headerName: '학교', width: 180, sortable: true },
            { field: 'remark', headerName: '비고', flex: 1, sortable: true },
            {
                headerName: '수정',
                width: 80,
                cellRenderer: function(params) {
                    return '<button class="edit-btn">수정</button>';
                },
                onCellClicked: function(params) {
                    openEditModal(params.data);
                }
            },
            {
                headerName: '삭제',
                width: 90,
                cellRenderer: function(params) {
                    return '<button class="delete-btn">삭제</button>';
                },
                onCellClicked: function(params) {
                    deleteUser(params.data);
                }
            }
        ];
        
        const gridOptions = {
            columnDefs: columnDefs,
            defaultColDef: {
                resizable: true
            },
            pagination: true,
            paginationPageSize: 100,
            domLayout: 'normal',
            rowHeight: 40
        };
        
        const gridApi = agGrid.createGrid(document.querySelector('#userGrid'), gridOptions);
        
        function loadUserData(searchName, searchPhone, searchUserType, searchStudentStatus) {
            const currentDate = getCurrentDateYmd();
            
            const normalizePhone = function(phone) {
                return (phone || '').replace(/-/g, '');
            };
            
            const normalizedSearchPhone = searchPhone ? normalizePhone(searchPhone) : '';
            
            db.collection('bta_users').get()
                .then(function(querySnapshot) {
                    const promises = [];
                    const data = [];
                    
                    querySnapshot.forEach(function(doc) {
                        const docData = doc.data();
                        const name = docData.name || '';
                        const phone = docData.phone || '';
                        const userType = docData.user_type || '';
                        const studentStatus = docData.student_status || '';
                        
                        if (searchName && !name.startsWith(searchName)) {
                            return;
                        }
                        if (normalizedSearchPhone && !normalizePhone(phone).startsWith(normalizedSearchPhone)) {
                            return;
                        }
                        if (searchUserType && userType !== searchUserType) {
                            return;
                        }
                        if (searchStudentStatus && studentStatus !== searchStudentStatus) {
                            return;
                        }
                        
                        const userTypeCd = docData.user_type || '';
                        const studentStatusCd = docData.student_status || '';
                        
                        const userPromise = Promise.all([
                            userTypeCd ? getLookupValueName(db, '110', userTypeCd, currentDate) : Promise.resolve(null),
                            studentStatusCd ? getLookupValueName(db, '130', studentStatusCd, currentDate) : Promise.resolve(null)
                        ]).then(function(results) {
                            data.push({
                                id: doc.id,
                                userId: docData.userId || '',
                                name: name,
                                email: docData.email || '',
                                phone: phone,
                                user_type: userTypeCd,
                                user_type_nm: results[0] || '',
                                student_status: studentStatusCd,
                                student_status_nm: results[1] || '',
                                user_school: docData.user_school || '',
                                remark: docData.remark || ''
                            });
                        });
                        
                        promises.push(userPromise);
                    });
                    
                    return Promise.all(promises).then(function() {
                        return data;
                    });
                })
                .then(function(data) {
                    data.sort(function(a, b) {
                        return (a.name || '').localeCompare(b.name || '');
                    });
                    
                    allUserData = data;
                    gridApi.setGridOption('rowData', data);
                })
                .catch(function(error) {
                    console.error('사용자 데이터 로드 오류:', error);
                    let errorMessage = '사용자 데이터를 불러오는 중 오류가 발생했습니다.';
                    if (error.code === 'permission-denied') {
                        errorMessage += '\n\nFirestore 보안 규칙을 확인해주세요.';
                        errorMessage += '\n\nFirebase 콘솔 > Firestore Database > 규칙 탭에서';
                        errorMessage += '\n다음 규칙을 추가해주세요:';
                        errorMessage += '\n\nmatch /bta_users/{document=**} {';
                        errorMessage += '\n  allow read, write: if request.auth != null;';
                        errorMessage += '\n}';
                    } else if (error.message) {
                        errorMessage += '\n\n오류 코드: ' + (error.code || '알 수 없음');
                        errorMessage += '\n오류 메시지: ' + error.message;
                    }
                    alert(errorMessage);
                });
        }
        
        function openAddModal() {
            isEditMode = false;
            editDocumentId = null;
            document.getElementById('modalTitle').textContent = '사용자 등록';
            document.getElementById('modalName').value = '';
            document.getElementById('modalName').readOnly = false;
            document.getElementById('modalEmail').value = '';
            document.getElementById('modalEmail').readOnly = false;
            document.getElementById('modalPhone').value = '';
            document.getElementById('modalUserType').value = '';
            document.getElementById('modalStudentStatus').value = '';
            document.getElementById('modalSchool').value = '';
            document.getElementById('modalRemark').value = '';
            document.getElementById('modal').style.display = 'block';
        }
        
        function openEditModal(data) {
            isEditMode = true;
            editDocumentId = data.id;
            document.getElementById('modalTitle').textContent = '사용자 수정';
            document.getElementById('modalName').value = data.name || '';
            document.getElementById('modalName').readOnly = true;
            document.getElementById('modalEmail').value = data.email || '';
            document.getElementById('modalEmail').readOnly = true;
            document.getElementById('modalPhone').value = data.phone || '';
            document.getElementById('modalUserType').value = data.user_type || '';
            document.getElementById('modalStudentStatus').value = data.student_status || '';
            document.getElementById('modalSchool').value = data.user_school || '';
            document.getElementById('modalRemark').value = data.remark || '';
            document.getElementById('modal').style.display = 'block';
        }
        
        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }
        
        function saveUser() {
            const name = document.getElementById('modalName').value.trim();
            const email = document.getElementById('modalEmail').value.trim();
            const phone = document.getElementById('modalPhone').value.trim();
            const userType = document.getElementById('modalUserType').value;
            const studentStatus = document.getElementById('modalStudentStatus').value;
            const school = document.getElementById('modalSchool').value.trim();
            const remark = document.getElementById('modalRemark').value.trim();
            
            if (isEditMode) {
                const data = {
                    phone: phone,
                    user_type: userType,
                    student_status: studentStatus,
                    user_school: school,
                    remark: remark,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                };
                
                db.collection('bta_users').doc(editDocumentId).update(data)
                    .then(function() {
                        alert('수정되었습니다.');
                        closeModal();
                        loadUserData('', '', '', '');
                    })
                    .catch(function(error) {
                        console.error('수정 오류:', error);
                        alert('수정 중 오류가 발생했습니다: ' + error.message);
                    });
            } else {
                if (!name) {
                    alert('성명을 입력해주세요.');
                    return;
                }
                if (!email) {
                    alert('이메일을 입력해주세요.');
                    return;
                }
                
                db.collection('bta_users')
                    .where('email', '==', email)
                    .get()
                    .then(function(querySnapshot) {
                        if (!querySnapshot.empty) {
                            alert('이미 등록된 이메일입니다.');
                            return Promise.reject(new Error('이미 등록된 이메일'));
                        }
                        
                        const data = {
                            name: name,
                            email: email,
                            phone: phone,
                            user_type: userType,
                            student_status: studentStatus,
                            user_school: school,
                            remark: remark,
                            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                        };
                        
                        return db.collection('bta_users').add(data);
                    })
                    .then(function() {
                        alert('등록되었습니다.');
                        closeModal();
                        loadUserData('', '', '', '');
                    })
                    .catch(function(error) {
                        if (error.message !== '이미 등록된 이메일') {
                            console.error('등록 오류:', error);
                            alert('등록 중 오류가 발생했습니다: ' + error.message);
                        }
                    });
            }
        }
        
        function deleteUser(data) {
            if (!confirm('정말 삭제하시겠습니까?')) {
                return;
            }
            
            db.collection('bta_users').doc(data.id).delete()
                .then(function() {
                    alert('삭제되었습니다.');
                    loadUserData('', '', '', '');
                })
                .catch(function(error) {
                    console.error('삭제 오류:', error);
                    alert('삭제 중 오류가 발생했습니다: ' + error.message);
                });
        }
        
        function exportToExcel() {
            if (allUserData.length === 0) {
                alert('다운로드할 데이터가 없습니다.');
                return;
            }
            
            const exportData = allUserData.map(function(item) {
                return {
                    '성명': item.name || '',
                    '이메일': item.email || '',
                    '전화번호': item.phone || '',
                    '사용자구분': item.user_type_nm || '',
                    '재학구분': item.student_status_nm || '',
                    '학교': item.user_school || '',
                    '비고': item.remark || ''
                };
            });
            
            const ws = XLSX.utils.json_to_sheet(exportData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, '사용자');
            
            const fileName = '사용자_' + new Date().toISOString().slice(0, 10).replace(/-/g, '') + '.xlsx';
            XLSX.writeFile(wb, fileName);
        }
        
        document.getElementById('searchButton').addEventListener('click', function() {
            const searchName = document.getElementById('searchName').value.trim();
            const searchPhone = document.getElementById('searchPhone').value.trim();
            const searchUserType = document.getElementById('searchUserType').value;
            const searchStudentStatus = document.getElementById('searchStudentStatus').value;
            loadUserData(searchName, searchPhone, searchUserType, searchStudentStatus);
        });
        
        document.getElementById('exportExcelButton').addEventListener('click', exportToExcel);
        
        document.getElementById('addButton').addEventListener('click', openAddModal);
        
        document.getElementById('saveButton').addEventListener('click', saveUser);
        
        document.getElementById('cancelButton').addEventListener('click', closeModal);
        
        document.querySelector('.close-button').addEventListener('click', closeModal);
        
        window.addEventListener('click', function(event) {
            const modal = document.getElementById('modal');
            if (event.target === modal) {
                closeModal();
            }
        });
        
        auth.onAuthStateChanged(function(user) {
            if (user) {
                loadLookupLists();
                loadUserData('', '', '', '');
            } else {
                window.location.href = '../../login.html';
            }
        });
    </script>
</body>
</html>
