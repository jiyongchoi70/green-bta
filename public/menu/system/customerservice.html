    <style>
        .progress-modal-overlay {
            position: fixed; left: 0; top: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            z-index: 10001;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .progress-modal-overlay.hidden { display: none; }
        .progress-modal-box {
            background: #fff;
            padding: 24px 32px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            min-width: 280px;
            text-align: center;
        }
        .progress-modal-box p {
            margin: 0 0 16px 0;
            font-size: 16px;
            font-weight: bold;
            color: #333;
        }
        .progress-bar-wrap {
            height: 8px;
            background: #e5e7eb;
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            width: 40%;
            background: #2563eb;
            border-radius: 4px;
            animation: progressIndeterminate 1.2s ease-in-out infinite;
        }
        @keyframes progressIndeterminate {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(350%); }
        }
    </style>

    <script>
        const auth = firebase.auth();
        const db = firebase.firestore();
        const storage = firebase.storage();
        
        let isEditMode = false;
        let editDocumentId = null;
        let customerserviceCdList = [];
        let allCsRequestData = [];
        let currentUser = null;
        let currentUserData = null;
        let attachmentsToDelete = [];
        let newAttachments = [];
        let selectedFiles = []; // 새로 선택한 파일 목록
        let isSaving = false; // 저장 중복 클릭 방지
        let viewDocumentId = null; // 조회 모달에서 댓글 저장 시 사용
        
        let announcementsGridApi = null;
        
        // room_type 확인 (관리자만 편집 가능)
        const roomType = 'system';
        const isAdmin = roomType === 'system';
        
        // Quill 에디터 (내용 필드)
        let quillEditor = null;
        if (typeof Quill !== 'undefined') {
            quillEditor = new Quill('#modalContents', {
                theme: 'snow',
                placeholder: '내용을 입력하세요.',
                modules: {
                    toolbar: [
                        [{ header: [1, 2, 3, false] }],
                        ['bold', 'italic', 'underline', 'strike'],
                        [{ list: 'ordered' }, { list: 'bullet' }],
                        [{ align: [] }],
                        ['link'],
                        ['clean']
                    ]
                }
            });
        }
        function setQuillContent(htmlOrText) {
            if (!quillEditor) return;
            var s = (htmlOrText || '').trim();
            if (s.length === 0) {
                quillEditor.setContents([{ insert: '\n' }], 'silent');
                return;
            }
            if (s.indexOf('<') !== -1) {
                var delta = quillEditor.clipboard.convert(s);
                quillEditor.setContents(delta, 'silent');
            } else {
                quillEditor.setText(s);
            }
        }
        function getQuillContent() {
            if (!quillEditor) return '';
            return quillEditor.root.innerHTML.trim();
        }
        function setQuillReadOnly(readOnly) {
            if (!quillEditor) return;
            quillEditor.enable(!readOnly);
        }
        function isQuillEmpty() {
            if (!quillEditor) return true;
            var html = quillEditor.root.innerHTML.trim();
            return !html || html === '<p><br></p>' || html === '<p></p>';
        }
        
        function canEditReceiptCompletionDate() {
            var email = (currentUser && currentUser.email) || (currentUserData && currentUserData.email) || '';
            return (email.trim() === 'jiyong-choi@hanmail.net');
        }
        
        function getCurrentDateYmd() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            return year + month + day;
        }
        
        function formatDateYmdToDash(ymd) {
            if (!ymd || ymd.length !== 8) return '';
            return ymd.substring(0, 4) + '-' + ymd.substring(4, 6) + '-' + ymd.substring(6, 8);
        }
        
        function loadLookupLists() {
            const currentDate = getCurrentDateYmd();
            
            getLookupValueList(db, '340', currentDate).then(function(list) {
                customerserviceCdList = list || [];
                const searchSelect = document.getElementById('searchNotificationCd');
                const modalSelect = document.getElementById('modalNotificationCd');
                if (searchSelect) {
                    searchSelect.innerHTML = '<option value="">전체</option>';
                    customerserviceCdList.forEach(function(item) {
                        const option = document.createElement('option');
                        option.value = item.value_cd;
                        option.textContent = item.value_nm;
                        searchSelect.appendChild(option);
                    });
                }
                if (modalSelect) {
                    modalSelect.innerHTML = '<option value="">선택하세요</option>';
                    customerserviceCdList.forEach(function(item) {
                        const option = document.createElement('option');
                        option.value = item.value_cd;
                        option.textContent = item.value_nm;
                        modalSelect.appendChild(option);
                    });
                }
            }).catch(function(error) {
                console.error('구분 공통코드 로드 오류:', error);
            });
        }
        
        function initAnnouncementsGrid() {
            const gridElement = document.querySelector('#announcementsGrid');
            if (!gridElement) {
                return;
            }
            
            if (announcementsGridApi) {
                try {
                    announcementsGridApi.destroy();
                } catch (e) {
                    console.error('그리드 파괴 오류:', e);
                }
            }
            
            const columnDefs = [];
            
            // 행번호 컬럼 (공통) - 페이지가 바뀌어도 순서 연속
            columnDefs.push({
                headerName: '순서',
                width: 60,
                sortable: false,
                valueGetter: function(params) {
                    if (!params.node) return '';
                    try {
                        const api = params.api;
                        const pageSize = api.getPaginationPageSize ? api.getPaginationPageSize() : 100;
                        const currentPage = api.paginationGetCurrentPage ? api.paginationGetCurrentPage() : 0;
                        return (currentPage * pageSize) + params.node.rowIndex + 1;
                    } catch (e) {
                        return (params.node.rowIndex ?? 0) + 1;
                    }
                }
            });
            
            columnDefs.push(
                { field: 'customerservice_cd_nm', headerName: '구분', width: 150, sortable: true },
                { 
                    field: 'title', 
                    headerName: '제목', 
                    width: 280, 
                    sortable: true,
                    cellRenderer: function(params) {
                        var title = (params.value || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
                        var count = (params.data && params.data.comment_count) ? params.data.comment_count : 0;
                        if (count > 0) {
                            return '<span style="color:#dc2626;font-weight:bold;margin-right:4px;">(' + count + ')</span><span style="color:#2563eb;text-decoration:underline;cursor:pointer;">' + title + '</span>';
                        }
                        return '<span style="color:#2563eb;text-decoration:underline;cursor:pointer;">' + title + '</span>';
                    },
                    onCellClicked: function(params) {
                        if (params.data) openViewModal(params.data);
                    }
                },
                { field: 'create_ymd_display', headerName: '제출일', width: 110, sortable: true },
                { field: 'start_ymd_display', headerName: '접수일', width: 110, sortable: true },
                { field: 'end_ymd_display', headerName: '완료일', width: 110, sortable: true },
                { field: 'create_user_nm', headerName: '작성자', width: 100, sortable: true }
            );
            
            // 관리자만 수정/삭제 컬럼 추가
            if (isAdmin) {
                columnDefs.push({
                    headerName: '수정',
                    width: 80,
                    cellRenderer: function(params) {
                        return '<button class="edit-btn">수정</button>';
                    },
                    onCellClicked: function(params) {
                        openEditModal(params.data);
                    }
                });
                columnDefs.push({
                    headerName: '삭제',
                    width: 80,
                    cellRenderer: function(params) {
                        return '<button class="delete-btn">삭제</button>';
                    },
                    onCellClicked: function(params) {
                        deleteCsRequest(params.data);
                    }
                });
            }
            
            const gridOptions = {
                columnDefs: columnDefs,
                defaultColDef: {
                    resizable: true
                },
                pagination: true,
                paginationPageSize: 100,
                domLayout: 'normal',
                rowHeight: 40
            };
            
            try {
                announcementsGridApi = agGrid.createGrid(gridElement, gridOptions);
            } catch (e) {
                console.error('그리드 초기화 오류:', e);
            }
        }
        
        function loadCsRequestData(searchNotificationCd, searchTitle) {
            const currentDate = getCurrentDateYmd();
            db.collection('bta_customerservice').get()
                .then(function(querySnapshot) {
                    const promises = [];
                    const data = [];
                    querySnapshot.forEach(function(doc) {
                        const docData = doc.data();
                        const customerserviceCd = docData.customerservice_cd || '';
                        const title = docData.title || '';
                        if (searchNotificationCd && customerserviceCd !== searchNotificationCd) return;
                        if (searchTitle && !title.includes(searchTitle)) return;
                        const promise = Promise.all([
                            customerserviceCd ? getLookupValueName(db, '340', customerserviceCd, currentDate) : Promise.resolve(null),
                            docData.create_user ? db.collection('bta_users').where('userId', '==', docData.create_user).get() : Promise.resolve(null)
                        ]).then(function(results) {
                            const customerserviceCdNm = results[0] || '';
                            const userQuerySnapshot = results[1];
                            let createUserNm = '';
                            if (userQuerySnapshot && !userQuerySnapshot.empty) {
                                userQuerySnapshot.forEach(function(userDoc) {
                                    createUserNm = userDoc.data().name || '';
                                });
                            }
                            const startYmd = docData.start_ymd || '';
                            const endYmd = docData.end_ymd || '';
                            const createYmd = docData.create_ymd || '';
                            var comments = docData.comments || [];
                            data.push({
                                id: doc.id,
                                customerservice_cd: customerserviceCd,
                                customerservice_cd_nm: customerserviceCdNm,
                                title: title,
                                comment_count: comments.length,
                                contents: docData.contents || '',
                                start_ymd: startYmd,
                                start_ymd_display: startYmd.length === 8 ? formatDateYmdToDash(startYmd) : startYmd,
                                end_ymd: endYmd,
                                end_ymd_display: endYmd.length === 8 ? formatDateYmdToDash(endYmd) : endYmd,
                                create_ymd: createYmd,
                                create_ymd_display: createYmd.length === 8 ? formatDateYmdToDash(createYmd) : createYmd,
                                create_user: docData.create_user || '',
                                create_user_nm: createUserNm,
                                update_user: docData.update_user || '',
                                update_date: docData.update_date || null,
                                attachments: docData.attachments || []
                            });
                        });
                        promises.push(promise);
                    });
                    return Promise.all(promises).then(function() { return data; });
                })
                .then(function(data) {
                    data.sort(function(a, b) {
                        return (b.create_ymd || '').localeCompare(a.create_ymd || '');
                    });
                    allCsRequestData = data;
                    if (announcementsGridApi) announcementsGridApi.setGridOption('rowData', data);
                })
                .catch(function(error) {
                    console.error('C/S 요청 데이터 로드 오류:', error);
                    showMessageModal('C/S 요청을 불러오는 중 오류가 발생했습니다: ' + error.message);
                });
        }
        
        function openAddModal() {
            isEditMode = false;
            editDocumentId = null;
            isModalOpening = true; // 모달 열기 시작
            
            document.getElementById('modalHeaderTitle').textContent = 'C/S 요청 등록';
            document.getElementById('announcementModal').classList.remove('modal-view-mode');
            viewDocumentId = null;
            document.getElementById('modalCommentsSection').style.display = 'none';
            
            document.getElementById('modalNotificationCd').value = '';
            document.getElementById('modalStartYmd').value = '';
            document.getElementById('modalEndYmd').value = '';
            document.getElementById('modalCreateYmd').value = formatDateYmdToDash(getCurrentDateYmd());
            document.getElementById('modalCreateUser').value = currentUserData ? (currentUserData.name || '') : '';
            document.getElementById('modalAnnouncementTitle').value = '';
            setQuillContent('');
            document.getElementById('modalFile').value = '';
            document.getElementById('fileList').innerHTML = '';
            document.getElementById('existingFiles').innerHTML = '';
            
            document.getElementById('modalNotificationCd').disabled = false;
            var canEditDates = canEditReceiptCompletionDate();
            document.getElementById('modalStartYmd').disabled = !canEditDates;
            document.getElementById('modalEndYmd').disabled = !canEditDates;
            document.getElementById('modalAnnouncementTitle').readOnly = false;
            setQuillReadOnly(false);
            document.getElementById('modalFile').disabled = false;
            
            // 저장 버튼 표시
            const saveButton = document.getElementById('saveButton');
            if (saveButton) {
                saveButton.style.display = '';
            }
            
            attachmentsToDelete = [];
            newAttachments = [];
            selectedFiles = [];
            
            // 초기값 저장 (공통코드 관리 방식 참고)
            startYmdInitialValue = '';
            endYmdInitialValue = '';
            
            document.getElementById('announcementModal').style.display = 'block';
            document.body.classList.add('modal-open');
            
            // 모달 열기 완료 후 검증 활성화
            setTimeout(function() {
                isModalOpening = false;
            }, 500);
        }
        
        function openViewModal(data) {
            // 읽기 전용 모달 열기 (관리자가 아닌 경우)
            isEditMode = false;
            editDocumentId = null;
            isModalOpening = true;
            
            document.getElementById('modalHeaderTitle').textContent = 'C/S 요청 조회';
            document.getElementById('announcementModal').classList.add('modal-view-mode');
            
            db.collection('bta_customerservice').doc(data.id).get().then(function(doc) {
                if (!doc.exists) {
                    showMessageModal('C/S 요청을 찾을 수 없습니다.');
                    isModalOpening = false;
                    return;
                }
                
                const docData = doc.data();
                
                // 폼에 데이터 채우기 (읽기 전용)
                const startYmdValue = docData.start_ymd && docData.start_ymd.length === 8 ? formatDateYmdToDash(docData.start_ymd) : '';
                const endYmdValue = docData.end_ymd && docData.end_ymd.length === 8 ? formatDateYmdToDash(docData.end_ymd) : '';
                
                document.getElementById('modalNotificationCd').value = docData.customerservice_cd || '';
                document.getElementById('modalStartYmd').value = startYmdValue;
                document.getElementById('modalEndYmd').value = endYmdValue;
                document.getElementById('modalCreateYmd').value = docData.create_ymd && docData.create_ymd.length === 8 ? formatDateYmdToDash(docData.create_ymd) : '';
                document.getElementById('modalCreateUser').value = data.create_user_nm || '';
                document.getElementById('modalAnnouncementTitle').value = docData.title || '';
                setQuillContent(docData.contents || '');
                document.getElementById('modalFile').value = '';
                document.getElementById('fileList').innerHTML = '';
                
                document.getElementById('modalNotificationCd').disabled = true;
                document.getElementById('modalStartYmd').disabled = true;
                document.getElementById('modalEndYmd').disabled = true;
                document.getElementById('modalAnnouncementTitle').readOnly = true;
                setQuillReadOnly(true);
                document.getElementById('modalFile').disabled = true;
                
                // 저장 버튼 숨기기
                const saveButton = document.getElementById('saveButton');
                if (saveButton) {
                    saveButton.style.display = 'none';
                }
                
                viewDocumentId = data.id;
                document.getElementById('modalCommentsSection').style.display = 'block';
                document.getElementById('modalCommentBody').value = '';
                renderCommentsList(docData.comments || []);
                
                // 기존 첨부파일 표시 (삭제 버튼 없이)
                const existingFilesDiv = document.getElementById('existingFiles');
                existingFilesDiv.innerHTML = '';
                if (docData.attachments && docData.attachments.length > 0) {
                    const filesList = document.createElement('div');
                    filesList.style.marginTop = '10px';
                    docData.attachments.forEach(function(file, index) {
                        const fileItem = document.createElement('div');
                        fileItem.style.display = 'flex';
                        fileItem.style.alignItems = 'center';
                        fileItem.style.gap = '10px';
                        fileItem.style.marginBottom = '5px';
                        fileItem.style.padding = '5px';
                        fileItem.style.backgroundColor = '#f5f5f5';
                        fileItem.style.borderRadius = '4px';
                        
                        const fileName = document.createElement('span');
                        fileName.textContent = file.name || '파일';
                        fileName.style.flex = '1';
                        
                        const downloadBtn = document.createElement('button');
                        downloadBtn.textContent = '다운로드';
                        downloadBtn.className = 'select-btn';

        function formatCommentDate(t) {
            if (!t) return '';
            var d = null;
            if (t.toDate && typeof t.toDate === 'function') d = t.toDate();
            else if (t instanceof Date) d = t;
            if (d) return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0') + ' ' + String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
            if (typeof t === 'string') return t;
            return '';
        }
        
        function renderCommentsList(comments) {
            var listEl = document.getElementById('modalCommentsList');
            listEl.innerHTML = '';
            if (!comments || comments.length === 0) {
                listEl.innerHTML = '<p style="color: #888; margin: 0; font-size: 14px;">댓글이 없습니다.</p>';
                return;
            }
            comments.forEach(function(c) {
                var div = document.createElement('div');
                div.style.cssText = 'padding: 10px; margin-bottom: 8px; background: #f9fafb; border-radius: 6px; border-left: 3px solid #2563eb;';
                var name = (c.user_name || '').trim() || '이름 없음';
                var date = formatCommentDate(c.created_at);
                var body = (c.body || '').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
                div.innerHTML = '<div style="font-size: 13px; color: #374151; margin-bottom: 4px;"><strong>' + name + '</strong>' + (date ? ' <span style="color: #6b7280;">' + date + '</span>' : '') + '</div><div style="font-size: 14px; color: #111;">' + body + '</div>';
                listEl.appendChild(div);

                    var comments = (doc.data().comments || []).slice();

                        user_id: currentUser ? currentUser.uid : '',
                        user_name: currentUserData ? (currentUserData.name || '') : '',
                        body: body,
                        created_at: new Date()
                    });
                    return db.collection('bta_customerservice').doc(viewDocumentId).update({ comments: comments });

        function saveCsRequest() {
            if (isSaving) return;
            setSaveButtonEnabled(false);
            var customerserviceCd = document.getElementById('modalNotificationCd').value;
            var startYmdInput = document.getElementById('modalStartYmd').value;
            var endYmdInput = document.getElementById('modalEndYmd').value;
            var createYmd = formatDateDashToYmd(document.getElementById('modalCreateYmd').value);
            var title = document.getElementById('modalAnnouncementTitle').value.trim();
            var contents = getQuillContent();
            var fileInput = document.getElementById('modalFile');
            
            if (!customerserviceCd) {
                setSaveButtonEnabled(true);
                showMessageModal('구분을 선택하세요.');
                return;
            }
            if (!title) {
                setSaveButtonEnabled(true);
                showMessageModal('제목을 입력하세요.');
                return;
            }
            if (isQuillEmpty()) {
                setSaveButtonEnabled(true);
                showMessageModal('내용을 입력하세요.');
                return;
            }
            if (quillEditor && quillEditor.getText().length > 5000) {
                setSaveButtonEnabled(true);
                showMessageModal('내용은 5000자 이내로 입력하세요.');
                return;
            }
            var contentsBytes = getUtf8ByteLength(contents);
            var contentsMaxBytes = 1000000;
            if (contentsBytes > contentsMaxBytes) {
                setSaveButtonEnabled(true);
                showMessageModal('내용이 너무 깁니다. (약 ' + Math.round(contentsBytes / 1024) + 'KB / 최대 약 1MB)\n이미지를 줄이거나 텍스트를 줄여 주세요.');
                return;
            }
            if (!validateDateRange()) {
                setSaveButtonEnabled(true);
                return;
            }
            var startYmd = (startYmdInput && startYmdInput.trim()) ? formatDateDashToYmd(startYmdInput) : '';
            var endYmd = (endYmdInput && endYmdInput.trim()) ? formatDateDashToYmd(endYmdInput) : '';
            
            const currentDate = getCurrentDateYmd();
            const currentTimestamp = firebase.firestore.FieldValue.serverTimestamp();
            const currentUserId = currentUser ? currentUser.uid : '';
            
            showProgressModal();
            // 첨부파일 업로드
            const uploadPromises = [];
            if (fileInput.files && fileInput.files.length > 0) {
                for (let i = 0; i < fileInput.files.length; i++) {
                    const file = fileInput.files[i];
                    const fileName = file.name;
                    const filePath = 'customerservice/' + currentUserId + '/' + Date.now() + '_' + fileName;
                    const storageRef = storage.ref(filePath);
                    
                    uploadPromises.push(
                        storageRef.put(file).then(function(snapshot) {
                            return {
                                name: fileName,
                                path: filePath,
                                size: file.size
                            };
                        })
                    );
                }
            }
            
            Promise.all(uploadPromises).then(function(uploadedFiles) {
                // 기존 첨부파일에서 삭제할 파일 제외
                if (isEditMode && editDocumentId) {
                    db.collection('bta_customerservice').doc(editDocumentId).get().then(function(doc) {
                        if (!doc.exists) {
                            hideProgressModal();
                            setSaveButtonEnabled(true);
                            showMessageModal('C/S 요청을 찾을 수 없습니다.');
                            return;
                        }
                        var existingAttachments = (doc.data().attachments || []).filter(function(file) {
                            return attachmentsToDelete.indexOf(file.path) === -1;
                        });
                        var allAttachments = existingAttachments.concat(uploadedFiles);
                        var deletePromises = attachmentsToDelete.map(function(fp) {
                            return storage.ref(fp).delete().catch(function(err) { console.error('파일 삭제 오류:', err); });
                        });
                        Promise.all(deletePromises).then(function() {
                            var updateData = {
                                customerservice_cd: customerserviceCd,
                                title: title,
                                contents: contents,
                                start_ymd: startYmd,
                                end_ymd: endYmd,
                                attachments: allAttachments,
                                update_user: currentUserData ? currentUserData.name : '',
                                update_date: currentTimestamp
                            };
                            db.collection('bta_customerservice').doc(editDocumentId).update(updateData)
                                .then(function() {
                                    hideProgressModal();
                                    setSaveButtonEnabled(true);
                                    showMessageModal('수정되었습니다.');
                                    closeModal();
                                    loadCsRequestData('', '');
                                })
                                .catch(function(error) {
                                    hideProgressModal();
                                    setSaveButtonEnabled(true);
                                    console.error('수정 오류:', error);
                                    showMessageModal('수정 중 오류가 발생했습니다: ' + error.message);
                                });
                        });
                    }).catch(function(error) {
                        hideProgressModal();
                        setSaveButtonEnabled(true);
                        console.error('C/S 요청 조회 오류:', error);
                        showMessageModal('C/S 요청을 불러오는 중 오류가 발생했습니다.');
                    });
                } else {
                    var allAttachments = uploadedFiles;
                    var addData = {
                        customerservice_cd: customerserviceCd,
                        title: title,
                        contents: contents,
                        start_ymd: startYmd,
                        end_ymd: endYmd,
                        create_ymd: createYmd || currentDate,
                        create_user: currentUser ? currentUser.uid : '',
                        attachments: allAttachments,
                        update_user: currentUserData ? currentUserData.name : '',
                        update_date: currentTimestamp
                    };
                    db.collection('bta_customerservice').add(addData)
                        .then(function() {
                            hideProgressModal();
                            setSaveButtonEnabled(true);
                            showMessageModal('등록되었습니다.');
                            closeModal();
                            loadCsRequestData('', '');
                        })
                        .catch(function(error) {
                            hideProgressModal();
                            setSaveButtonEnabled(true);
                            console.error('등록 오류:', error);
                            showMessageModal('등록 중 오류가 발생했습니다: ' + error.message);
                        });
                }
            }).catch(function(error) {
                hideProgressModal();
                setSaveButtonEnabled(true);
                console.error('파일 업로드 오류:', error);
                showMessageModal('파일 업로드 중 오류가 발생했습니다: ' + error.message);
            });
        }
        
        function deleteCsRequest(data) {
            showConfirmModal('정말 삭제하시겠습니까?', function() {
            if (data.attachments && data.attachments.length > 0) {
                var deletePromises = data.attachments.map(function(file) {
                    return storage.ref(file.path).delete().catch(function(err) { console.error('파일 삭제 오류:', err); });

                Promise.all(deletePromises).then(function() {
                    db.collection('bta_customerservice').doc(data.id).delete()
                        .then(function() {
                            showMessageModal('삭제되었습니다.');
                            loadCsRequestData('', '');

                        .catch(function(error) {
                            console.error('삭제 오류:', error);
                            showMessageModal('삭제 중 오류가 발생했습니다: ' + error.message);
                        });
                });
            } else {
                db.collection('bta_customerservice').doc(data.id).delete()
                    .then(function() {
                        showMessageModal('삭제되었습니다.');
                        loadCsRequestData('', '');

                    .catch(function(error) {
                        console.error('삭제 오류:', error);
                        showMessageModal('삭제 중 오류가 발생했습니다: ' + error.message);
                    });
            }
            });
        }

        function setupDateValidation() {

        }
        
        function validateDateRange() {
            const startYmdInput = document.getElementById('modalStartYmd');
            const endYmdInput = document.getElementById('modalEndYmd');
            
            if (!startYmdInput.value || !endYmdInput.value) {
                return true; // 둘 다 입력되지 않았으면 검증하지 않음 (통과)
            }
            
            // 년도 4자리 검증
            const startYear = startYmdInput.value.substring(0, 4);
            const endYear = endYmdInput.value.substring(0, 4);
            if (startYear.length !== 4 || isNaN(startYear) || parseInt(startYear) < 1000 || parseInt(startYear) > 9999) {
                showMessageModal('접수일의 년도는 4자리 숫자여야 합니다.');
                startYmdInput.focus();
                return false;
            }
            if (endYear.length !== 4 || isNaN(endYear) || parseInt(endYear) < 1000 || parseInt(endYear) > 9999) {
                showMessageModal('완료일의 년도는 4자리 숫자여야 합니다.');
                endYmdInput.focus();
                return false;
            }
            var startDate = new Date(startYmdInput.value);
            var endDate = new Date(endYmdInput.value);
            if (startDate > endDate) {
                showMessageModal('접수일은 완료일보다 작거나 같아야 합니다.');
                startYmdInput.focus();
                return false;
            }
            
            return true; // 검증 통과
        }

        // 파일 선택 시 미리보기
        document.getElementById('modalFile').addEventListener('change', function(e) {
            const fileList = document.getElementById('fileList');
            
            if (e.target.files && e.target.files.length > 0) {
                // 기존 파일 목록의 개수 확인
                const existingItems = fileList.querySelectorAll('div[data-file-index]');
                const startIndex = existingItems.length;
                
                // 새로 선택한 파일들을 기존 목록에 추가
                Array.from(e.target.files).forEach(function(file, index) {
                    // 중복 파일 체크 (같은 이름의 파일이 이미 있는지 확인)
                    const isDuplicate = selectedFiles.some(function(existingFile) {
                        return existingFile.name === file.name && existingFile.size === file.size;
                    });
                    
                    if (isDuplicate) {
                        showMessageModal('이미 추가된 파일입니다: ' + file.name);
                        return;
                    }
                    
                    selectedFiles.push(file);
                    
                    const fileItem = document.createElement('div');
                    fileItem.style.display = 'flex';
                    fileItem.style.alignItems = 'center';
                    fileItem.style.gap = '10px';
                    fileItem.style.marginBottom = '5px';
                    fileItem.style.padding = '5px';
                    fileItem.style.backgroundColor = '#e3f2fd';
                    fileItem.style.borderRadius = '4px';
                    fileItem.setAttribute('data-file-index', startIndex + index);
                    
                    const fileName = document.createElement('span');
                    fileName.textContent = file.name + ' (' + (file.size / 1024).toFixed(2) + ' KB)';
                    fileName.style.flex = '1';
                    
                    const deleteBtn = document.createElement('button');
                    deleteBtn.textContent = '삭제';
                    deleteBtn.className = 'delete-btn';
                    deleteBtn.style.fontSize = '12px';
                    deleteBtn.onclick = function() {
                        showConfirmModal('첨부파일을 삭제하시겠습니까?', function() {
                            const fileIndex = parseInt(fileItem.getAttribute('data-file-index'));
                            selectedFiles.splice(fileIndex, 1);
                            fileItem.remove();
                            
                            // 파일 입력 필드 업데이트
                            const dataTransfer = new DataTransfer();
                            selectedFiles.forEach(function(file) {
                                dataTransfer.items.add(file);
                            });
                            document.getElementById('modalFile').files = dataTransfer.files;
                            
                            // 인덱스 재설정
                            const remainingItems = fileList.querySelectorAll('div[data-file-index]');
                            remainingItems.forEach(function(item, idx) {
                                item.setAttribute('data-file-index', idx);
                            });
                        });
                    };
                    
                    fileItem.appendChild(fileName);
                    fileItem.appendChild(deleteBtn);
                    fileList.appendChild(fileItem);
                });
                
                // 파일 입력 필드 업데이트 (기존 파일 + 새 파일)
                const dataTransfer = new DataTransfer();
                selectedFiles.forEach(function(file) {
                    dataTransfer.items.add(file);
                });
                document.getElementById('modalFile').files = dataTransfer.files;
            }
        });
        
        auth.onAuthStateChanged(function(user) {
            if (user) {
                currentUser = user;
                
                // 현재 사용자 정보 가져오기
                db.collection('bta_users').doc(user.uid).get().then(function(doc) {
                    if (doc.exists) {
                        currentUserData = doc.data();
                    }
                    
                    loadLookupLists();
                    initAnnouncementsGrid();
                    loadCsRequestData('', '');
                }).catch(function(error) {
                    console.error('사용자 정보 가져오기 오류:', error);
                    loadLookupLists();
                    initAnnouncementsGrid();
                    loadCsRequestData('', '');
                });
            } else {
                window.location.href = '../../login.html';
            }
        });
    </script>
</body>
</html>
