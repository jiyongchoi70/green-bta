    <div class="container">
        <div class="announcements-header">
            <h1 class="page-title">학부모 등록</h1>

        <div class="parent-registration-container">

                <div class="filter-section" style="margin-bottom: 15px; padding: 15px; background-color: #f9fafb; border-radius: 6px; border: 1px solid #e5e7eb;">

            <div class="student-section">

    <div id="parentModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="parentModalTitle">학부모등록</h3>

            <div class="modal-body">
                <table class="modal-form">
                    <tr>

                    <tr>
                        <td>학부모</td>
                        <td>

                        </td>

                </table>
            </div>
            <div class="modal-footer">
                <button id="saveParentButton" class="save-button">저장</button>
                <button id="cancelParentButton" class="cancel-button">취소</button>

    <div id="parentUserSearchModal" class="modal">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h3>사용자 조회</h3>
                <span class="close-button">&times;</span>
            </div>
            <div class="modal-body">
                <div class="search-section">
                    <div class="search-fields">
                        <div class="search-field">
                            <label>성명</label>
                            <input type="text" id="searchParentUserName" class="search-input" placeholder="성명 입력">
                        </div>
                        <div class="search-field">
                            <label>전화번호</label>
                            <input type="text" id="searchParentUserPhone" class="search-input" placeholder="전화번호 입력">
                        </div>
                        <div class="search-field">
                            <label>사용자구분</label>
                            <select id="searchParentUserType" class="search-select search-select-medium" disabled>
                                <option value="">전체</option>
                            </select>
                        </div>
                        <div class="search-field">
                            <label>재학구분</label>

                        </div>

                    </div>
                </div>
                <div id="parentUserSearchGrid" class="ag-theme-alpine" style="height: 400px; margin-top: 15px;"></div>
                <div style="margin-top: 10px; padding: 10px; background-color: #e3f2fd; border-radius: 4px; color: #1976d2; font-size: 14px;">
                    💡 <strong>사용법:</strong> 행을 <strong>클릭</strong>하여 선택한 후, 하단의 <strong>"선택" 버튼</strong>을 클릭하세요.
                </div>
            </div>
            <div class="modal-footer">
                <button id="selectParentConfirmButton" class="save-button">선택</button>

        </div>

    <div id="userSearchModal" class="modal">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h3>사용자 조회</h3>
                <span class="close-button">&times;</span>
            </div>
            <div class="modal-body">
                <div class="search-section">
                    <div class="search-fields">
                        <div class="search-field">
                            <label>성명</label>
                            <input type="text" id="searchUserName" class="search-input" placeholder="성명 입력">
                        </div>
                        <div class="search-field">
                            <label>전화번호</label>
                            <input type="text" id="searchUserPhone" class="search-input" placeholder="전화번호 입력">
                        </div>
                        <div class="search-field">
                            <label>사용자구분</label>
                            <select id="searchUserUserType" class="search-select search-select-small" disabled>
                                <option value="">전체</option>
                            </select>
                        </div>
                        <div class="search-field">
                            <label>재학구분</label>
                            <select id="searchUserStudentStatus" class="search-select search-select-small">
                                <option value="">전체</option>
                            </select>
                        </div>
                        <button id="searchUserSearchButton" class="search-button">조회</button>
                    </div>
                </div>
                <div id="userSearchGrid" class="ag-theme-alpine" style="height: 400px; margin-top: 15px;"></div>
                <div style="margin-top: 10px; padding: 10px; background-color: #e3f2fd; border-radius: 4px; color: #1976d2; font-size: 14px;">
                    💡 <strong>사용법:</strong> 체크박스를 선택한 후, 하단의 <strong>"저장" 버튼</strong>을 클릭하세요.
                </div>
            </div>
            <div class="modal-footer">
                <button id="selectUserConfirmButton" class="save-button">저장</button>
                <button id="closeUserSearchButton" class="cancel-button">닫기</button>
            </div>
        </div>
    </div>
    
    <script>
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        let selectedParentId = null;
        let semesterList = [];
        let allStudentData = [];
        let studentStatusList = [];
        let userTypeList = [];
        // 공통 모달 사용으로 전역 변수 제거
        // let allUserData = [];
        // let userSearchGridClickHandler = null;
        
        function getCurrentDateYmd() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            return year + month + day;
        }
        
        function loadLookupLists() {
            const currentDate = getCurrentDateYmd();
            
            Promise.all([
                getLookupValueList(db, '140', currentDate),
                getLookupValueList(db, '130', currentDate),
                getLookupValueList(db, '110', currentDate)
            ]).then(function(results) {
                semesterList = results[0] || [];
                studentStatusList = results[1] || [];
                userTypeList = results[2] || [];
                
                // sort 필드 기준으로 내림차순 정렬
                semesterList.sort(function(a, b) {
                    const sortA = a.sort || 0;
                    const sortB = b.sort || 0;
                    return sortB - sortA; // 내림차순 (desc)
                });
                
                const semesterSelect = document.getElementById('modalSemester');
                if (semesterSelect) {
                    semesterSelect.innerHTML = '<option value="">선택하세요</option>';
                    semesterList.forEach(function(item) {
                        const option = document.createElement('option');
                        option.value = item.value_cd;
                        option.textContent = item.value_nm;
                        semesterSelect.appendChild(option);
                    });
                }
                
                // 학부모등록 조회 필터 - 학기 드롭다운
                const filterSemesterSelect = document.getElementById('filterSemester');
                if (filterSemesterSelect) {
                    filterSemesterSelect.innerHTML = '<option value="">전체</option>';
                    semesterList.forEach(function(item) {
                        const option = document.createElement('option');
                        option.value = item.value_cd;
                        option.textContent = item.value_nm;
                        filterSemesterSelect.appendChild(option);
                    });
                }
                
                // 사용자조회 모달의 재학구분 드롭다운
                const searchUserStudentStatusSelect = document.getElementById('searchUserStudentStatus');
                if (searchUserStudentStatusSelect) {
                    searchUserStudentStatusSelect.innerHTML = '<option value="">전체</option>';
                    let defaultStudentStatusCd = '';
                    studentStatusList.forEach(function(item) {
                        const option = document.createElement('option');
                        option.value = item.value_cd;
                        option.textContent = item.value_nm;
                        searchUserStudentStatusSelect.appendChild(option);
                        if (item.value_nm === '재학') {
                            defaultStudentStatusCd = item.value_cd;
                        }
                    });
                    if (defaultStudentStatusCd) {
                        searchUserStudentStatusSelect.value = defaultStudentStatusCd;
                    }
                }
                
                // 공통 학부모/사용자 조회 모달 초기화
                if (typeof ParentUserSearchModal !== 'undefined') {
                    ParentUserSearchModal.init({
                        title: '사용자 조회',
                        userTypeDefault: '학부모',
                        userTypeDisabled: true,
                        studentStatusList: studentStatusList,
                        userTypeList: userTypeList,
                        db: db,
                        getCurrentDateYmd: getCurrentDateYmd,
                        onSelect: function(userId, name, data) {
                            // 선택된 사용자 정보를 학부모등록 모달에 설정
                            const modalParentNameElement = document.getElementById('modalParentName');
                            if (modalParentNameElement) {
                                modalParentNameElement.value = name;
                                modalParentNameElement.setAttribute('data-userid', userId);
                                
                                // 학부모 조회 모달 닫기
                                ParentUserSearchModal.close();
                                
                                // modal-open 클래스 제거
                                checkAndRemoveModalClass();
                            } else {
                                // 학부모등록 모달이 열려있지 않으면 열기
                                ParentUserSearchModal.close();
                                checkAndRemoveModalClass();
                                openAddParentModal();
                                
                                setTimeout(function() {
                                    const element = document.getElementById('modalParentName');
                                    if (element) {
                                        element.value = name;
                                        element.setAttribute('data-userid', userId);
                                        alert('학부모가 선택되었습니다: ' + name + '\n\n학기를 선택하고 저장 버튼을 클릭하세요.');
                                    }
                                }, 200);
                            }
                        }
                    });
                    
                    // 공통 모달이 닫힐 때도 확인하도록 래핑
                    const originalClose = ParentUserSearchModal.close;
                    ParentUserSearchModal.close = function() {
                        originalClose.call(this);
                        setTimeout(function() {
                            checkAndRemoveModalClass();
                        }, 100);
                    };
                }
                
                // 공통 사용자조회 모달 초기화 (학부모등록용)
                if (typeof UserSearchModal !== 'undefined') {
                    UserSearchModal.init({
                        title: '사용자 조회',
                        userTypeDefault: '학생', // 학생으로 고정
                        userTypeDisabled: true, // 수정 불가
                        collectionName: 'bta_parent_students',
                        idFieldName: 'parent_id',
                        getSelectedId: function() { return selectedParentId; },
                        loadDataCallback: loadStudentData,
                        studentStatusList: studentStatusList,
                        userTypeList: userTypeList,
                        db: db,
                        getCurrentDateYmd: getCurrentDateYmd
                    });
                    
                    // 공통 모달이 닫힐 때도 확인하도록 래핑
                    const originalClose = UserSearchModal.close;
                    UserSearchModal.close = function() {
                        originalClose.call(this);
                        // 약간의 지연 후 확인 (모달이 완전히 닫힌 후)
                        setTimeout(function() {
                            checkAndRemoveModalClass();
                        }, 100);
                    };
                }
            })
            .catch(function(error) {
                console.error('공통코드 로드 오류:', error);
            });
        }
        
        const parentColumnDefs = [
            { field: 'semester_nm', headerName: '학기', flex: 1, sortable: true },
            { field: 'parent_name', headerName: '학부모', flex: 1, sortable: true },
            { field: 'phone', headerName: '전화번호', flex: 1, sortable: true },
            {
                headerName: '삭제',
                width: 80,
                cellRenderer: function(params) {
                    return '<button class="delete-btn">삭제</button>';
                },
                onCellClicked: function(params) {
                    deleteParent(params.data);
                }
            }
        ];
        
        const studentColumnDefs = [
            { field: 'name', headerName: '성명', width: 150, sortable: true },
            { field: 'user_type_nm', headerName: '사용자구분', width: 150, sortable: true },
            { field: 'phone', headerName: '전화번호', width: 180, sortable: true },
            {
                headerName: '삭제',
                width: 100,
                cellRenderer: function(params) {
                    return '<button class="delete-btn">삭제</button>';
                },
                onCellClicked: function(params) {
                    deleteStudent(params.data);
                }
            }
        ];
        
        const parentGridOptions = {
            columnDefs: parentColumnDefs,
            rowSelection: 'single',
            suppressRowClickSelection: false,
            onFirstDataRendered: function(event) {
                if (event.api.getDisplayedRowCount() > 0) {
                    const firstNode = event.api.getRowNode({ rowIndex: 0 });
                    if (firstNode) {
                        firstNode.setSelected(true, true);
                        event.api.ensureIndexVisible(0, 'middle');
                    }
                }
            },
            onRowClicked: function(event) {
                if (event.data) {
                    selectedParentId = event.data.parent_id;
                    loadStudentData(selectedParentId);
                }
            }
        };
        
        const studentGridOptions = {
            columnDefs: studentColumnDefs,
            defaultColDef: {
                resizable: true
            },
            domLayout: 'normal',
            rowHeight: 40
        };
        
        const parentGridApi = agGrid.createGrid(document.querySelector('#parentGrid'), parentGridOptions);
        const studentGridApi = agGrid.createGrid(document.querySelector('#studentGrid'), studentGridOptions);
        
        function loadParentData() {
            const currentDate = getCurrentDateYmd();
            
            // 조회 필터 값 가져오기
            const filterSemester = document.getElementById('filterSemester') ? document.getElementById('filterSemester').value : '';
            const filterParentName = document.getElementById('filterParentName') ? document.getElementById('filterParentName').value.trim() : '';
            
            db.collection('bta_parent').get()
                .then(function(querySnapshot) {
                    const promises = [];
                    const data = [];
                    
                    querySnapshot.forEach(function(doc) {
                        const docData = doc.data();
                        const semesterCd = docData.semester_cd || '';
                        const userid = docData.userid || docData.userld || '';
                        
                        const parentPromise = Promise.all([
                            semesterCd ? getLookupValueName(db, '140', semesterCd, currentDate) : Promise.resolve(null),
                            semesterCd ? getLookupValueSort(db, '140', semesterCd, currentDate) : Promise.resolve(0),
                            userid ? db.collection('bta_users').where('userId', '==', userid).get() : Promise.resolve(null)
                        ]).then(function(results) {
                            const semesterNm = results[0] || '';
                            const semesterSort = results[1] || 0;
                            const userSnapshot = results[2];
                            
                            let parentName = '';
                            let parentPhone = '';
                            if (userSnapshot && !userSnapshot.empty) {
                                const userDoc = userSnapshot.docs[0];
                                const userData = userDoc.data();
                                parentName = userData.name || '';
                                parentPhone = userData.phone || '';
                            }
                            
                            // 필터 조건 적용
                            if (filterSemester && semesterCd !== filterSemester) {
                                return; // 학기 필터에 맞지 않으면 제외
                            }
                            if (filterParentName && !parentName.startsWith(filterParentName)) {
                                return; // 학부모 성명 필터에 맞지 않으면 제외
                            }
                            
                            data.push({
                                parent_id: doc.id,
                                semester_cd: semesterCd,
                                semester_nm: semesterNm,
                                userid: userid,
                                parent_name: parentName,
                                phone: parentPhone,
                                semester_sort: semesterSort
                            });
                        });
                        
                        promises.push(parentPromise);
                    });
                    
                    return Promise.all(promises).then(function() {
                        return data;
                    });
                })
                .then(function(data) {
                    data.sort(function(a, b) {
                        if (a.semester_sort !== b.semester_sort) {
                            return b.semester_sort - a.semester_sort; // 내림차순 (desc)
                        }
                        return (a.parent_name || '').localeCompare(b.parent_name || '');
                    });
                    
                    parentGridApi.setGridOption('rowData', data);
                    if (data.length > 0) {
                        selectedParentId = data[0].parent_id;
                        loadStudentData(selectedParentId);
                        setTimeout(function() {
                            try {
                                parentGridApi.forEachNode(function(node) {
                                    if (node.rowIndex === 0) {
                                        node.setSelected(true, true);
                                        parentGridApi.ensureIndexVisible(0, 'middle');
                                        return;
                                    }
                                });
                            } catch (e) {
                                console.error('첫 행 선택 오류:', e);
                            }
                        }, 200);
                    } else {
                        studentGridApi.setGridOption('rowData', []);
                    }
                })
                .catch(function(error) {
                    console.error('학부모등록 데이터 로드 오류:', error);
                    let errorMessage = '학부모등록 데이터를 불러오는 중 오류가 발생했습니다.';
                    if (error.code === 'permission-denied') {
                        errorMessage += '\n\nFirestore 보안 규칙을 확인해주세요.';
                        errorMessage += '\n\nFirebase 콘솔 > Firestore Database > 규칙 탭에서';
                        errorMessage += '\n다음 규칙을 추가해주세요:';
                        errorMessage += '\n\nmatch /bta_parent/{document=**} {';
                        errorMessage += '\n  allow read, write: if request.auth != null;';
                        errorMessage += '\n}';
                        errorMessage += '\n\nmatch /bta_parent_students/{document=**} {';
                        errorMessage += '\n  allow read, write: if request.auth != null;';
                        errorMessage += '\n}';
                    } else if (error.message) {
                        errorMessage += '\n\n오류 코드: ' + (error.code || '알 수 없음');
                        errorMessage += '\n오류 메시지: ' + error.message;
                    }
                    alert(errorMessage);
                });
        }
        
        function loadStudentData(parentId) {
            if (!parentId) {
                studentGridApi.setGridOption('rowData', []);
                return;
            }
            
            const currentDate = getCurrentDateYmd();
            
            db.collection('bta_parent_students')
                .where('parent_id', '==', parentId)
                .get()
                .then(function(querySnapshot) {
                    const promises = [];
                    const data = [];
                    
                    querySnapshot.forEach(function(doc) {
                        const docData = doc.data();
                        const userId = docData.userid || docData.userld || '';
                        
                        if (!userId) {
                            return;
                        }
                        
                        const studentPromise = db.collection('bta_users')
                            .where('userId', '==', userId)
                            .get()
                            .then(function(userSnapshot) {
                                if (userSnapshot.empty) {
                                    return;
                                }
                                
                                const userDoc = userSnapshot.docs[0];
                                const userData = userDoc.data();
                                const userTypeCd = userData.user_type || '';
                                
                                return getLookupValueName(db, '110', userTypeCd, currentDate)
                                    .then(function(userTypeNm) {
                                        return getLookupValueSort(db, '110', userTypeCd, currentDate)
                                            .then(function(userTypeSort) {
                                                data.push({
                                                    id: doc.id,
                                                    userId: userId,
                                                    name: userData.name || '',
                                                    user_type: userTypeCd,
                                                    user_type_nm: userTypeNm || '',
                                                    phone: userData.phone || '',
                                                    user_type_sort: userTypeSort || 0
                                                });
                                            });
                                    });
                            });
                        
                        promises.push(studentPromise);
                    });
                    
                    return Promise.all(promises).then(function() {
                        return data;
                    });
                })
                .then(function(data) {
                    data.sort(function(a, b) {
                        if (a.user_type_sort !== b.user_type_sort) {
                            return a.user_type_sort - b.user_type_sort;
                        }
                        return (a.name || '').localeCompare(b.name || '');
                    });
                    
                    allStudentData = data;
                    studentGridApi.setGridOption('rowData', data);
                    setTimeout(function() {
                        try {
                            if (studentGridApi && studentGridApi.sizeColumnsToFit) {
                                studentGridApi.sizeColumnsToFit();
                            }
                        } catch (e) {
                            console.error('컬럼 크기 조정 오류:', e);
                        }
                    }, 100);
                })
                .catch(function(error) {
                    console.error('학생등록 데이터 로드 오류:', error);
                    let errorMessage = '학생등록 데이터를 불러오는 중 오류가 발생했습니다.';
                    if (error.code === 'permission-denied') {
                        errorMessage += '\n\nFirestore 보안 규칙을 확인해주세요.';
                        errorMessage += '\n\nFirebase 콘솔 > Firestore Database > 규칙 탭에서';
                        errorMessage += '\n다음 규칙을 추가해주세요:';
                        errorMessage += '\n\nmatch /bta_parent_students/{document=**} {';
                        errorMessage += '\n  allow read, write: if request.auth != null;';
                        errorMessage += '\n}';
                    } else if (error.message) {
                        errorMessage += '\n\n오류 코드: ' + (error.code || '알 수 없음');
                        errorMessage += '\n오류 메시지: ' + error.message;
                    }
                    alert(errorMessage);
                });
        }
        
        function openAddParentModal() {
            document.getElementById('parentModalTitle').textContent = '학부모등록';
            document.getElementById('modalSemester').value = '';
            document.getElementById('modalParentName').value = '';
            document.getElementById('modalParentName').removeAttribute('data-userid');
            document.getElementById('parentModal').style.display = 'block';
            document.body.classList.add('modal-open');
        }
        
        function closeParentModal() {
            document.getElementById('parentModal').style.display = 'none';
            checkAndRemoveModalClass();
        }
        
        function checkAndRemoveModalClass() {
            const parentModal = document.getElementById('parentModal');
            const parentUserSearchModal = document.getElementById('parentUserSearchModal');
            const userSearchModal = document.getElementById('userSearchModal');
            
            // 모든 모달이 닫혀있는지 확인
            const allModalsClosed = 
                (!parentModal || parentModal.style.display === 'none' || parentModal.style.display === '') &&
                (!parentUserSearchModal || parentUserSearchModal.style.display === 'none' || parentUserSearchModal.style.display === '') &&
                (!userSearchModal || userSearchModal.style.display === 'none' || userSearchModal.style.display === '');
            
            if (allModalsClosed) {
                document.body.classList.remove('modal-open');
            }
        }
        
        function saveParent() {
            const semesterCd = document.getElementById('modalSemester').value;
            const userid = document.getElementById('modalParentName').getAttribute('data-userid');
            
            if (!semesterCd) {
                alert('학기를 선택해주세요.');
                return;
            }
            
            if (!userid) {
                alert('학부모를 선택해주세요.');
                return;
            }
            
            db.collection('bta_parent')
                .where('semester_cd', '==', semesterCd)
                .where('userid', '==', userid)
                .get()
                .then(function(querySnapshot) {
                    if (!querySnapshot.empty) {
                        alert('이미 등록된 학기와 학부모 조합입니다.');
                        return Promise.reject(new Error('중복'));
                    }
                    
                    const data = {
                        semester_cd: semesterCd,
                        userid: userid
                    };
                    
                    return db.collection('bta_parent').add(data);
                })
                .then(function() {
                    alert('등록되었습니다.');
                    closeParentModal();
                    loadParentData();
                })
                .catch(function(error) {
                    if (error.message !== '중복') {
                        console.error('등록 오류:', error);
                        alert('등록 중 오류가 발생했습니다: ' + error.message);
                    }
                });
        }
        
        function deleteParent(data) {
            if (!confirm('정말 삭제하시겠습니까?')) {
                return;
            }
            
            db.collection('bta_parent_students')
                .where('parent_id', '==', data.parent_id)
                .get()
                .then(function(querySnapshot) {
                    if (!querySnapshot.empty) {
                        alert('등록된 학생이 있어 삭제할 수 없습니다.');
                        return Promise.reject(new Error('학생 존재'));
                    }
                    
                    return db.collection('bta_parent').doc(data.parent_id).delete();
                })
                .then(function() {
                    alert('삭제되었습니다.');
                    loadParentData();
                })
                .catch(function(error) {
                    if (error.message !== '학생 존재') {
                        console.error('삭제 오류:', error);
                        alert('삭제 중 오류가 발생했습니다: ' + error.message);
                    }
                });
        }
        
        function deleteStudent(data) {
            if (!confirm('정말 삭제하시겠습니까?')) {
                return;
            }
            
            db.collection('bta_parent_students').doc(data.id).delete()
                .then(function() {
                    alert('삭제되었습니다.');
                    loadStudentData(selectedParentId);
                })
                .catch(function(error) {
                    console.error('삭제 오류:', error);
                    alert('삭제 중 오류가 발생했습니다: ' + error.message);
                });
        }
        
        function openParentSearchModal() {
            if (typeof ParentUserSearchModal !== 'undefined') {
                ParentUserSearchModal.open();
            } else {
                console.error('ParentUserSearchModal이 로드되지 않았습니다.');
            }
        }
        
        // 공통 모달 사용으로 기존 함수들 제거
        // closeParentSearchModal, searchParentUsers, initParentSearchGrid, selectParentFromGrid는
        // parent_user_search_modal.js에서 처리됨
        
        // 공통 모달 사용으로 기존 함수들 제거
        // searchParentUsers, selectParentFromGrid, initParentSearchGrid는
        // parent_user_search_modal.js에서 처리됨
        
        // 공통 모달 사용으로 기존 함수들 제거
        // openUserSearchModal, closeUserSearchModal, initUserSearchGrid, 
        // attachUserSearchGridClickHandler, searchUsers, saveSelectedUsers 함수는
        // user_search_modal.js에서 처리됨
        
        function exportToExcel() {
            if (allStudentData.length === 0) {
                alert('다운로드할 데이터가 없습니다.');
                return;
            }
            
            const exportData = allStudentData.map(function(item) {
                return {
                    '성명': item.name || '',
                    '사용자구분': item.user_type_nm || '',
                    '전화번호': item.phone || ''
                };
            });
            
            const ws = XLSX.utils.json_to_sheet(exportData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, '학생등록');
            
            const fileName = '학생등록_' + new Date().toISOString().slice(0, 10).replace(/-/g, '') + '.xlsx';
            XLSX.writeFile(wb, fileName);
        }
        
        document.getElementById('addParentButton').addEventListener('click', openAddParentModal);
        document.getElementById('saveParentButton').addEventListener('click', saveParent);
        document.getElementById('cancelParentButton').addEventListener('click', closeParentModal);
        
        // 학부모등록 모달 내 조회 아이콘 버튼 이벤트
        const searchParentButton = document.getElementById('searchParentButton');
        if (searchParentButton) {
            searchParentButton.addEventListener('click', openParentSearchModal);
        }
        
        // 학부모등록 조회 필터 버튼 이벤트
        const filterSearchParentButton = document.getElementById('filterSearchParentButton');
        if (filterSearchParentButton) {
            filterSearchParentButton.addEventListener('click', function() {
                loadParentData();
            });
        }
        
        // 공통 모달에서 이벤트 리스너를 연결하므로 기존 이벤트 리스너 제거
        // searchParentSearchButton, selectParentConfirmButton, closeParentSearchButton은
        // parent_user_search_modal.js에서 처리됨
        
        document.getElementById('addStudentButton').addEventListener('click', function() {
            if (typeof UserSearchModal !== 'undefined') {
                UserSearchModal.open();
            } else {
                console.error('UserSearchModal이 로드되지 않았습니다.');
            }
        });
        
        // 공통 모달에서 이벤트 리스너를 연결하므로 기존 이벤트 리스너 제거
        // searchUserSearchButton, selectUserConfirmButton, closeUserSearchButton은
        // user_search_modal.js에서 처리됨
        document.getElementById('exportExcelButton').addEventListener('click', exportToExcel);
        
        document.querySelectorAll('.close-button').forEach(function(btn) {
            btn.addEventListener('click', function() {
                if (btn.closest('#userSearchModal')) {
                    if (typeof UserSearchModal !== 'undefined') {
                        UserSearchModal.close();
                    }
                } else if (btn.closest('#parentUserSearchModal')) {
                    if (typeof ParentUserSearchModal !== 'undefined') {
                        ParentUserSearchModal.close();
                    }
                } else {
                    closeParentModal();
                }
            });
        });
        
        window.addEventListener('click', function(event) {
            if (event.target.id === 'parentModal') {
                closeParentModal();
            }
            if (event.target.id === 'parentUserSearchModal') {
                if (typeof ParentUserSearchModal !== 'undefined') {
                    ParentUserSearchModal.close();
                }
            }
            if (event.target.id === 'userSearchModal') {
                if (typeof UserSearchModal !== 'undefined') {
                    UserSearchModal.close();
                }
            }
        });
        
        auth.onAuthStateChanged(function(user) {
            if (user) {
                loadLookupLists();
                loadParentData();
            } else {
                window.location.href = '../../login.html';
            }
        });
    </script>
</body>
</html>
