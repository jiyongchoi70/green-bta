            function getCurrentDateYmd() {
                const now = new Date();
                const year = now.getFullYear();
                const month = String(now.getMonth() + 1).padStart(2, '0');
                const day = String(now.getDate()).padStart(2, '0');
                return year + month + day;
            }
            
            function dateToYmd(dateStr) {
                if (!dateStr) return '';
                return dateStr.replace(/-/g, '');
            }
            
            function ymdToDate(ymd) {
                if (!ymd || ymd.length !== 8) return '';
                return ymd.substring(0, 4) + '-' + ymd.substring(4, 6) + '-' + ymd.substring(6, 8);
            }

            /** 과제목록 생성 시 bta_student_score 문서 ID (학기·반·주차·학생당 1건) */
            function buildStudentScoreDocId(semesterCd, classCd, weekCd, userid) {
                function seg(s) {
                    return String(s || '').trim().replace(/\//g, '_').replace(/\s+/g, '_');
                }
                return [seg(semesterCd), seg(classCd), seg(weekCd), seg(userid)].join('_');
            }

            function commitStudentScoreStubsForTaskGroup(semesterCd, classCd, weekCd, students) {
                if (!semesterCd || !classCd || !weekCd || !students || students.length === 0) {
                    return Promise.resolve();
                }
                var ymd = getCurrentDateYmd();
                var BATCH = 400;
                var idx = 0;
                function runNext() {
                    if (idx >= students.length) return Promise.resolve();
                    var batch = db.batch();
                    var n = 0;
                    while (idx < students.length && n < BATCH) {
                        var uid = (students[idx].user_id || '').toString().trim();
                        idx++;
                        if (!uid) continue;
                        var docId = buildStudentScoreDocId(semesterCd, classCd, weekCd, uid);
                        var ref = db.collection('bta_student_score').doc(docId);
                        batch.set(ref, {
                            semester_cd: semesterCd,
                            class_cd: classCd,
                            week_cd: weekCd,
                            userid: uid,
                            create_ymd: ymd
                        }, { merge: true });
                        n++;
                    }
                    return batch.commit().then(runNext);
                }
                return runNext();
            }

            function deleteStudentScoreStubsForTaskGroup(semesterCd, classCd, weekCd, students) {
                if (!semesterCd || !classCd || !weekCd || !students || students.length === 0) {
                    return Promise.resolve();
                }
                var BATCH = 400;
                var idx = 0;
                function runNext() {
                    if (idx >= students.length) return Promise.resolve();
                    var batch = db.batch();
                    var n = 0;
                    while (idx < students.length && n < BATCH) {
                        var uid = (students[idx].user_id || '').toString().trim();
                        idx++;
                        if (!uid) continue;
                        var docId = buildStudentScoreDocId(semesterCd, classCd, weekCd, uid);
                        batch.delete(db.collection('bta_student_score').doc(docId));
                        n++;
                    }
                    return batch.commit().then(runNext);
                }
                return runNext();
            }

            /** 주차 그룹 기준 반 학생 목록(훈련생 user_type 100) — 점수 스텁 생성/삭제 공통 */
            function fetchStudentsForTaskGroupScore(taskGroupDocId) {
                return db.collection('bta_task_group').doc(taskGroupDocId).get()
                    .then(function(docSnap) {
                        if (!docSnap.exists) return null;
                        var btg = docSnap.data();
                        var semesterCd = (btg.semester_cd || '').toString().trim();
                        var classCd = (btg.class_cd || '').toString().trim();
                        var weekCd = (btg.week_cd || '').toString().trim();
                        if (!semesterCd || !classCd) return null;
                        return db.collection('bta_class')
                            .where('semester_cd', '==', semesterCd)
                            .where('class_cd', '==', classCd)
                            .limit(1)
                            .get()
                            .then(function(classSnap) {
                                if (classSnap.empty) return null;
                                var classId = classSnap.docs[0].id;
                                return db.collection('bta_class_students').where('class_id', '==', classId).get()
                                    .then(function(studentsSnap) {
                                        return db.collection('bta_users').where('user_type', '==', '100').get()
                                            .then(function(userSnap) {
                                                var studentUserIds = {};
                                                userSnap.forEach(function(doc) {
                                                    var uid = (doc.data().userId || doc.data().userid || '').toString().trim();
                                                    if (uid) studentUserIds[uid] = true;
                                                });
                                                var filteredStudents = [];
                                                studentsSnap.forEach(function(doc) {
                                                    var userid = (doc.data().userid || doc.data().userId || '').toString().trim();
                                                    if (userid && studentUserIds[userid]) filteredStudents.push({ user_id: userid });
                                                });
                                                return {
                                                    semesterCd: semesterCd,
                                                    classCd: classCd,
                                                    weekCd: weekCd,
                                                    students: filteredStudents
                                                };
                                            });
                                    });
                            });
                    });
            }

        function loadTaskGroupList() {
            const semesterCd = document.getElementById('searchSemester').value;
            const classCd = document.getElementById('searchClass').value;
            const weekCd = document.getElementById('searchWeek').value;
            
            if (!semesterCd || !classCd) {
                showMessageModal('학기와 반은 필수 조회 조건입니다.');
                return;
            }
            
            let query = db.collection('bta_task_group')
                .where('semester_cd', '==', semesterCd)
                .where('class_cd', '==', classCd);
            
            if (weekCd) {
                query = query.where('week_cd', '==', weekCd);
            }
            
            const currentDate = getCurrentDateYmd();
            
            query.get().then(function(querySnapshot) {
                const promises = [];
                const data = [];
                
                querySnapshot.forEach(function(doc) {
                    const docData = doc.data();
                    const semesterPromise = getLookupValueName(db, '140', docData.semester_cd || '', currentDate);
                    const classPromise = getLookupValueName(db, '120', docData.class_cd || '', currentDate);
                    const weekPromise = docData.week_cd ? getLookupValueName(db, '230', docData.week_cd, currentDate) : Promise.resolve(null);
                    
                    const itemPromise = Promise.all([semesterPromise, classPromise, weekPromise]).then(function(results) {
                        data.push({
                            id: doc.id,
                            task_group_id: doc.id,
                            semester_cd: docData.semester_cd || '',
                            semester_nm: results[0] || '',
                            class_cd: docData.class_cd || '',
                            class_nm: results[1] || '',
                            week_cd: docData.week_cd || '',
                            week_nm: results[2] || '',
                            start_ymd: docData.start_ymd || '',
                            end_ymd: docData.end_ymd || '',
                            view_ymd: docData.view_ymd || '',
                            complete_yn: (docData.complete_yn || 'N').toString().trim(),
                            create_ymd: docData.create_ymd || ''
                        });
                    });
                    
                    promises.push(itemPromise);
                });
                
                return Promise.all(promises).then(function() {
                    return data;
                });
            }).then(function(data) {

                    .where('task_group_id', '==', taskGroupId)
                    .get()
                    .then(function(querySnapshot) {
                        const promises = [];
                        const data = [];
                        
                        querySnapshot.forEach(function(doc) {

                                    task_group_id: docData.task_group_id || '',
                                    task_cd: taskCd,
                                    task_nm: taskNm || ''
                                });
                            });
                            
                            promises.push(itemPromise);
                        });
                        
                        return Promise.all(promises).then(function() {
                            return data;
                        });
                    }).then(function(data) {
                        data.sort(function(a, b) {
                            const codeA = a.task_cd || '';
                            const codeB = b.task_cd || '';
                            return codeA.localeCompare(codeB);

                const semesterCd = document.getElementById('modalTaskGroupSemester').value;
                const classCd = document.getElementById('modalTaskGroupClass').value;
                const weekCd = document.getElementById('modalTaskGroupWeek').value;
                const startDate = document.getElementById('modalTaskGroupStartDate').value;
                const endDate = document.getElementById('modalTaskGroupEndDate').value;
                
                if (!semesterCd || !classCd) {
                    showMessageModal('학기와 반은 필수 항목입니다.');
                    return;
                }
                
                if (!weekCd) {
                    showMessageModal('주차는 필수 항목입니다.');
                    return;
                }
                
                if (!startDate || !endDate) {
                    showMessageModal('시작일과 종료일은 필수 항목입니다.');
                    return;
                }
                
                const startYmd = dateToYmd(startDate);
                const endYmd = dateToYmd(endDate);
                
                if (endYmd < startYmd) {
                    showMessageModal('종료일은 시작일보다 크거나 같아야 합니다.');
                    return;
                }
                
                const data = {
                    semester_cd: semesterCd,
                    class_cd: classCd,
                    week_cd: weekCd,
                    start_ymd: startYmd,
                    end_ymd: endYmd,
                    create_ymd: getCurrentDateYmd()
                };
                if (!isEditModeTaskGroup) {
                    data.view_ymd = '';
                    data.complete_yn = 'N';
                }
                
                db.collection('bta_task_group')
                    .where('semester_cd', '==', semesterCd)
                    .where('class_cd', '==', classCd)
                    .where('week_cd', '==', weekCd)
                    .get()
                    .then(function(snap) {
                        let duplicate = false;
                        if (!snap.empty) {
                            if (isEditModeTaskGroup && editTaskGroupDocumentId) {
                                snap.forEach(function(doc) {
                                    if (doc.id !== editTaskGroupDocumentId) {
                                        duplicate = true;
                                    }
                                });
                            } else {
                                duplicate = true;
                            }
                        }
                        if (duplicate) {
                            showMessageModal('동일한 학기·반·주차가 이미 등록되어 있습니다.');
                            return;
                        }
                        if (isEditModeTaskGroup && editTaskGroupDocumentId) {

                                .then(function() {
                                    showMessageModal('수정되었습니다.');
                                    closeTaskGroupModal();
                                    loadTaskGroupList();
                                });
                        } else {
                            return db.collection('bta_task_group').add(data)
                                .then(function(docRef) {
                                    showMessageModal('등록되었습니다.');
                                    closeTaskGroupModal();
                                    loadTaskGroupList();

            function doTaskCreate() {
                if (!selectedTaskGroupId) return;
                const dateVal = document.getElementById('taskCreateViewYmd').value.trim();
                if (!dateVal) {
                    showMessageModal('개시일 등록 후 생성을 진행해 주세요.');
                    return;
                }
                const viewYmdFromModal = dateVal.replace(/-/g, '');
                showTaskListProgressModal();
                db.collection('bta_task_group').doc(selectedTaskGroupId).get()
                    .then(function(docSnap) {
                        if (!docSnap.exists) return Promise.reject(new Error('not found'));
                        return docSnap.data();
                    })
                    .then(function(btg) {
                        const semesterCd = (btg.semester_cd || '').toString().trim();
                        const classCd = (btg.class_cd || '').toString().trim();
                        const weekCd = (btg.week_cd || '').toString().trim();
                        const startYmd = (btg.start_ymd || '').toString().trim();
                        if (!semesterCd || !classCd) return Promise.reject(new Error('no class'));
                        return db.collection('bta_class')
                            .where('semester_cd', '==', semesterCd)
                            .where('class_cd', '==', classCd)
                            .limit(1)
                            .get()
                            .then(function(classSnap) {
                                if (classSnap.empty) return Promise.reject(new Error('no class'));
                                return { classId: classSnap.docs[0].id, btg: btg, weekCd: weekCd, startYmd: startYmd };
                            });
                    })
                    .then(function(ctx) {
                        return db.collection('bta_class_students').where('class_id', '==', ctx.classId).get()
                            .then(function(studentsSnap) {
                                return { ctx: ctx, students: studentsSnap };
                            });
                    })
                    .then(function(o) {
                        if (o.students.empty) {
                            hideTaskListProgressModal();
                            showMessageModal('학생을 먼저 등록후에 생성해주세요.');
                            return Promise.reject(new Error('no students'));
                        }
                        return db.collection('bta_task_detail').where('task_group_id', '==', selectedTaskGroupId).get()
                            .then(function(detailSnap) {
                                return { ctx: o.ctx, students: o.students, details: detailSnap };
                            });
                    })
                    .then(function(o) {
                        return db.collection('bta_users').where('user_type', '==', '100').get()
                            .then(function(userSnap) {
                                const studentUserIds = {};
                                userSnap.forEach(function(doc) {
                                    const uid = (doc.data().userId || doc.data().userid || '').toString().trim();
                                    if (uid) studentUserIds[uid] = true;
                                });
                                const filteredStudents = [];
                                o.students.forEach(function(doc) {
                                    const userid = (doc.data().userid || doc.data().userId || '').toString().trim();
                                    if (userid && studentUserIds[userid]) filteredStudents.push({ user_id: userid });
                                });
                                return { ctx: o.ctx, students: o.students, details: o.details, filteredStudents: filteredStudents };
                            });
                    })
                    .then(function(o) {
                        const btg = o.ctx.btg;
                        const weekCd = (o.ctx.weekCd || '').toString().trim();
                        const startYmd = (o.ctx.startYmd || '').toString().trim();
                        if (weekCd && startYmd.length === 8) {
                            return getLookupValueSort(db, '230', weekCd, startYmd)
                                .then(function(s) { return { o: o, sortVal: (s !== undefined && s !== null) ? s : 0 }; })
                                .catch(function() { return { o: o, sortVal: 0 }; });
                        }
                        return Promise.resolve({ o: o, sortVal: 0 });
                    })
                    .then(function(payload) {
                        const o = payload.o;
                        const weekSortVal = (payload.sortVal !== undefined && payload.sortVal !== null) ? payload.sortVal : 0;
                        const btg = o.ctx.btg;
                        const semesterCd = (btg.semester_cd || '').toString().trim();
                        const classCd = (btg.class_cd || '').toString().trim();
                        const weekCd = (o.ctx.weekCd || '').toString().trim();
                        const students = o.filteredStudents || [];
                        if (students.length === 0 || o.details.empty) {
                            hideTaskListProgressModal();
                            showMessageModal('해당 반에 학생이 없거나 과제목록이 없습니다.');
                            return Promise.reject(new Error('no data'));
                        }
                        var taskCdSeen = {};
                        var taskCdList = [];
                        o.details.forEach(function(doc) {
                            const taskCd = (doc.data().task_cd || '').toString().trim();
                            if (taskCd && !taskCdSeen[taskCd]) {
                                taskCdSeen[taskCd] = true;
                                taskCdList.push(taskCd);
                            }
                        });
                        var taskCdToSort = {};
                        return Promise.all(taskCdList.map(function(taskCd) {
                            return db.collection('bta_lookup_type').where('type_cd', '==', taskCd).limit(1).get()
                                .then(function(snap) {
                                    if (snap.empty) {
                                        taskCdToSort[taskCd] = weekSortVal;
                                        return;
                                    }
                                    const d = snap.docs[0].data();
                                    const s = (d.sort !== undefined && d.sort !== null) ? d.sort : weekSortVal;
                                    taskCdToSort[taskCd] = s;
                                });
                        })).then(function() {
                            const batch = db.batch();
                            o.details.forEach(function(doc) {
                                const taskCd = (doc.data().task_cd || '').toString().trim();
                                if (!taskCd) return;
                                const detailSort = (taskCdToSort[taskCd] !== undefined && taskCdToSort[taskCd] !== null) ? taskCdToSort[taskCd] : weekSortVal;
                                students.forEach(function(s) {
                                    const ref = db.collection('bta_student_task').doc();
                                    batch.set(ref, {
                                        task_group_id: selectedTaskGroupId,
                                        class_cd: classCd,
                                        semester_cd: semesterCd,
                                        week_cd: weekCd,
                                        user_id: s.user_id,
                                        task_cd: taskCd,
                                        sort: detailSort,
                                        create_ymd: getCurrentDateYmd()
                                    });
                                });
                            });
                            return batch.commit().then(function() {
                                return commitStudentScoreStubsForTaskGroup(semesterCd, classCd, weekCd, students);
                            });
                        });
                    })
                    .then(function() {
                        return db.collection('bta_task_group').doc(selectedTaskGroupId).update({
                            complete_yn: 'Y',
                            view_ymd: viewYmdFromModal
                        });
                    })
                    .then(function() {
                        hideTaskListProgressModal();
                        showMessageModal('생성되었습니다.');
                        closeTaskCreateModal();
                        loadTaskGroupList();
                    })
                    .catch(function(err) {
                        if (err && err.message && (err.message === 'not found' || err.message === 'no class' || err.message === 'no data' || err.message === 'no students')) {
                            hideTaskListProgressModal();
                            return;
                        }
                        hideTaskListProgressModal();
                        console.error('과제목록 생성 오류:', err);
                        showMessageModal('생성 중 오류가 발생했습니다.');
                    });
            }
            
            function doTaskCreateDelete() {
                if (!selectedTaskGroupId) return;
                showConfirmModal('생성된 과제목록을 삭제하시겠습니까?', function() {
                showTaskListProgressModal();
                db.collection('bta_student_task').where('task_group_id', '==', selectedTaskGroupId).get()
                    .then(function(snap) {
                        const batch = db.batch();
                        snap.forEach(function(doc) { batch.delete(doc.ref); });
                        return batch.commit();
                    })
                    .then(function() {
                        return fetchStudentsForTaskGroupScore(selectedTaskGroupId);
                    })
                    .then(function(scoreCtx) {
                        if (!scoreCtx || !scoreCtx.weekCd) return Promise.resolve();
                        return deleteStudentScoreStubsForTaskGroup(
                            scoreCtx.semesterCd,
                            scoreCtx.classCd,
                            scoreCtx.weekCd,
                            scoreCtx.students
                        );
                    })
                    .then(function() {
                        return db.collection('bta_task_group').doc(selectedTaskGroupId).update({
                            complete_yn: 'N',
                            view_ymd: null
                        });
                    })
                    .then(function() {
                        hideTaskListProgressModal();
                        showMessageModal('생성삭제되었습니다.');
                        closeTaskCreateModal();
                        loadTaskGroupList();
                    })
                    .catch(function(err) {
                        hideTaskListProgressModal();
                        console.error('생성삭제 오류:', err);
                        showMessageModal('삭제 중 오류가 발생했습니다.');
                    });
            });
            }
            
            function doCopyTaskToGroup() {
                const sourceId = document.getElementById('copySourceTaskGroupSelect').value;
                if (!sourceId || !copyTargetTaskGroupId) {
                    showMessageModal('복사할 주차를 선택하세요.');
                    return;
                }
                db.collection('bta_task_detail')
                    .where('task_group_id', '==', sourceId)
                    .get()
                    .then(function(snap) {
                        if (snap.empty) {
                            showMessageModal('선택한 주차에 복사할 과제목록이 없습니다.');
                            return;
                        }
                        const batch = db.batch();
                        snap.forEach(function(doc) {
                            const d = doc.data();
                            const ref = db.collection('bta_task_detail').doc();
                            batch.set(ref, { task_group_id: copyTargetTaskGroupId, task_cd: d.task_cd || '' });
                        });
                        return batch.commit();
                    })
                    .then(function() {
                        showMessageModal('복사되었습니다.');
                        closeTaskGroupCopyModal();
                        if (selectedTaskGroupId === copyTargetTaskGroupId) {
                            loadTaskDetailData(copyTargetTaskGroupId);
                        }
                        loadTaskGroupList();
                    })
                    .catch(function(err) {
                        if (err && err.message && err.message.includes('복사할 과제목록')) return;
                        console.error('과제복사 오류:', err);
                        showMessageModal('복사 중 오류가 발생했습니다.');
                    });
            }
            
            function openTaskDetailAddModal() {
                if (!selectedTaskGroupId) {
                    showMessageModal('학기별 반별 주차등록을 먼저 선택해주세요.');
                    return;
                }
                
                db.collection('bta_task_group').doc(selectedTaskGroupId).get()
                    .then(function(docSnap) {
                        if (!docSnap.exists) {
                            showMessageModal('선택한 주차 정보를 찾을 수 없습니다.');
                            return;
                        }
                        const viewYmd = (docSnap.data().view_ymd || '').toString().trim();
                        if (viewYmd !== '') {
                            showMessageModal('개시일이 있으면 등록이 안됩니다.');
                            return;
                        }
                        isEditModeTaskDetail = false;
                        editTaskDetailDocumentId = null;
                        document.getElementById('taskDetailModalTitle').textContent = '과제목록 등록';
                        document.getElementById('modalTaskDetailTask').value = '';
                        loadTaskListForDetail();
                        document.getElementById('taskDetailModal').style.display = 'block';
                    })
                    .catch(function(error) {
                        console.error('주차 조회 오류:', error);
                        showMessageModal('주차 정보를 확인하는 중 오류가 발생했습니다.');
                    });
            }
            
            function openTaskDetailEditModal(data) {
                isEditModeTaskDetail = true;
                editTaskDetailDocumentId = data.id;
                document.getElementById('taskDetailModalTitle').textContent = '과제목록 수정';
                loadTaskListForDetail();
                setTimeout(function() {
                    document.getElementById('modalTaskDetailTask').value = data.task_cd || '';
                }, 200);
                document.getElementById('taskDetailModal').style.display = 'block';
            }
            
        function closeTaskDetailModal() {
            document.getElementById('taskDetailModal').style.display = 'none';
            isEditModeTaskDetail = false;
            editTaskDetailDocumentId = null;
        }
        
        function saveTaskDetail() {
                if (!selectedTaskGroupId) {
                    showMessageModal('학기별 반별 주차등록을 먼저 선택해주세요.');
                    return;
                }
                
                const taskCd = document.getElementById('modalTaskDetailTask').value;
                
                if (!taskCd) {
                    showMessageModal('과제목록은 필수 항목입니다.');
                    return;
                }
                
                const data = {
                    task_group_id: selectedTaskGroupId,
                    task_cd: taskCd
                };
                
                if (isEditModeTaskDetail && editTaskDetailDocumentId) {
                    db.collection('bta_task_detail').doc(editTaskDetailDocumentId).update(data)
                        .then(function() {
                            showMessageModal('수정되었습니다.');
                            closeTaskDetailModal();
                            loadTaskDetailData(selectedTaskGroupId);
                        })
                        .catch(function(error) {
                            console.error('수정 오류:', error);
                            showMessageModal('수정 중 오류가 발생했습니다.');
                        });
                } else {
                    db.collection('bta_task_detail')
                        .where('task_group_id', '==', selectedTaskGroupId)
                        .where('task_cd', '==', taskCd)
                        .get()
                        .then(function(querySnapshot) {
                            if (!querySnapshot.empty) {
                                showMessageModal('이미 등록된 과제목록입니다.');
                                return;
                            }
                            
                            return db.collection('bta_task_detail').add(data);
                        })
                        .then(function(docRef) {
                            if (docRef) {
                                showMessageModal('등록되었습니다.');
                                closeTaskDetailModal();
                                loadTaskDetailData(selectedTaskGroupId);
                            }
                        })
                        .catch(function(error) {
                            console.error('등록 오류:', error);
                            if (error.message && error.message.includes('이미 등록된')) {
                                return;
                            }
                            showMessageModal('등록 중 오류가 발생했습니다.');
                        });
                }
            }
            
            function deleteTaskDetail(data) {
                showConfirmModal('정말 삭제하시겠습니까?', function() {
                const taskGroupId = (data.task_group_id || '').trim();
                if (!taskGroupId) {
                    showMessageModal('연결된 주차 정보를 찾을 수 없습니다.');
                    return;
                }
                
                db.collection('bta_task_group').doc(taskGroupId).get()
                    .then(function(docSnap) {
                        if (!docSnap.exists) {
                            showMessageModal('연결된 주차 정보를 찾을 수 없습니다.');
                            return Promise.reject(new Error('task_group not found'));
                        }
                        const viewYmd = (docSnap.data().view_ymd || '').toString().trim();
                        if (viewYmd !== '') {
                            showMessageModal('개시일이 있으면 삭제가 안됩니다.');
                            return Promise.reject(new Error('view_ymd exists'));
                        }
                        return db.collection('bta_task_detail').doc(data.id).delete();
                    })
                    .then(function() {
                        showMessageModal('삭제되었습니다.');
                        loadTaskDetailData(selectedTaskGroupId);
                    })
                    .catch(function(error) {
                        if (error && error.message && (error.message === 'view_ymd exists' || error.message === 'task_group not found')) {
                            return;
                        }
                        console.error('삭제 오류:', error);
                        showMessageModal('삭제 중 오류가 발생했습니다.');
                    });
            });
            }
            
        
        document.getElementById('searchButton').addEventListener('click', loadTaskGroupList);
        document.getElementById('addTaskGroupButton').addEventListener('click', openTaskGroupAddModal);
        document.getElementById('saveTaskGroupButton').addEventListener('click', saveTaskGroup);
        document.getElementById('cancelTaskGroupButton').addEventListener('click', closeTaskGroupModal);
        document.getElementById('addTaskDetailButton').addEventListener('click', openTaskDetailAddModal);
        document.getElementById('saveTaskDetailButton').addEventListener('click', saveTaskDetail);
        document.getElementById('cancelTaskDetailButton').addEventListener('click', closeTaskDetailModal);
        document.getElementById('doCopyTaskGroupButton').addEventListener('click', doCopyTaskToGroup);
        document.getElementById('cancelCopyTaskGroupButton').addEventListener('click', closeTaskGroupCopyModal);
        document.getElementById('taskCreateSaveButton').addEventListener('click', saveTaskCreateViewYmd);
        document.getElementById('taskCreateDoCreateButton').addEventListener('click', doTaskCreate);
        document.getElementById('taskCreateDoDeleteButton').addEventListener('click', doTaskCreateDelete);
        document.getElementById('taskCreateCancelButton').addEventListener('click', closeTaskCreateModal);
        document.querySelector('.task-create-modal-close').addEventListener('click', closeTaskCreateModal);
        
        document.querySelectorAll('.close-button').forEach(function(btn) {
            btn.addEventListener('click', function() {
                if (btn.closest('#taskGroupModal')) {
                    closeTaskGroupModal();
                } else if (btn.closest('#taskDetailModal')) {
                    closeTaskDetailModal();
                } else if (btn.closest('#taskGroupCopyModal')) {
                    closeTaskGroupCopyModal();
                } else if (btn.closest('#taskCreateModal')) {
                    closeTaskCreateModal();
                }
            });
        });
        
        window.addEventListener('click', function(event) {
            if (event.target.id === 'taskGroupModal') {
                closeTaskGroupModal();
            }
            if (event.target.id === 'taskDetailModal') {
                closeTaskDetailModal();
            }
            if (event.target.id === 'taskGroupCopyModal') {
                closeTaskGroupCopyModal();
            }
            if (event.target.id === 'taskCreateModal') {
                closeTaskCreateModal();
            }
        });
        
        auth.onAuthStateChanged(function(user) {
            if (user) {
                loadLookupLists();
            } else {
                window.location.href = '../../login.html';
            }
        });
    </script>
</body>
</html>
